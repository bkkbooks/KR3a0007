  - {type: variant, offset: 0, length: 7655, content: 說苑卷第十九脩文天下有道則禮樂征伐自天子出夫功成制禮治定作樂禮樂者行化之大者也孔子曰移風易俗莫善於樂安上治民莫善於禮是故聖王脩禮文設庠序陳鍾鼔天子辟雍諸侯泮宫所以行徳化詩云鎬京辟雍自西自東自南自北無思不服此之謂也積恩為愛積愛為仁積仁為靈靈臺之所以為靈者積仁也神靈者天地之本而為萬物之始也是故文王始接民以仁而天下莫不仁焉文徳之至也徳不至則不能文商者常也常者質質主天夏者大也大者文也文主地故王者一商一夏再而復者也正色三而復者也味尚甘聲尚宫一而復者故三王術如循環故夏后氏教以忠而君子忠矣小人之失野救野莫如敬故殷人教以敬而君子敬矣小人之失鬼救鬼莫如文故周人教以文而君子文矣小人之失薄救薄莫如忠故聖人之與聖也如矩之三雜規之三雜周則又始窮則反本也詩曰彫琢其章金玉其相言文質美也傳曰觸情從欲謂之禽獸苟可而行謂之野人安故重遷謂之衆庶辨然通古今之道謂之士進賢逹能謂之大夫敬上愛下謂之諸侯天覆地載謂之天子是故士服黼大夫黻諸侯火天子山龍徳彌盛者文彌縟中彌理者文彌章也詩曰左之左之君子宜之右之右之君子有之傳曰君子者無所不宜也是故韠冕厲戒立于廟堂之上有司執事無不敬者斬衰裳苴絰杖立于喪次賔客弔唁無不哀者被甲攖胄立于桴鼓之間士卒莫不勇者故仁足以懐百姓勇足以安危國信足以結諸侯强足以拒患難威足以率三軍故曰為左亦宜為右亦宜為君子無不宜者此之謂也齊景公登射晏子脩禮而待公曰選射之禮寡人厭之矣吾欲得天下勇士與之圖國晏子對曰君子無禮是庶人也庶人無禮是禽獸也夫臣勇多則弑其君子力多則弑其長然而不敢者惟禮之謂也禮者所以御民也轡者所以御馬也無禮而能治國家者嬰未之聞也景公曰善乃飭射更席以為上客終日問禮書曰五事一曰貎貎若男子之所以恭敬婦人之所以姣好也行歩中矩折旋中規立則磬折拱則抱鼓其以入君朝尊以嚴其以入宗廟敬以忠其以入鄉曲和以順其以入州里族黨之中和以親詩曰温温恭人惟徳之孔子曰恭近於禮逺耻辱也衣服容貎者所以恱目也聲音應對者所以恱耳也嗜慾好惡者所以恱心也君子衣服中容貎得則民之目恱矣言語順應對給則民之耳恱矣就仁去不仁則民之心恱矣三者存乎心暢乎體形乎動静雖不在位謂之素行故忠心好善而日新之獨居樂徳内恱而形詩曰何其䖏也必有與也何其久也必有以也惟有以者為能長生久視而無累於物也知天道者冠鉥知地道者履蹻能治煩決亂者佩觽能射御者佩韘能正三軍者搢笏衣必荷規而承矩負繩而凖下故君子衣服中而容貎得接其服而象其徳故望玉貎而行能有所定矣詩曰芄蘭之枝童子佩觽說行能者也冠者所以别成人也脩徳束躬以自申飭所以檢其邪心守其正意也君子始冠必祝成禮加冠以厲其心故君子成人必冠帶以行事棄㓜少嬉戲惰慢之心而衎衎於進徳脩業之志是故服不成象而内心不變内心脩徳外被禮文所以成顯令之名也是故皮弁素積百王不易既以脩徳又以正容孔子曰正其衣冠尊其瞻視儼然人望而畏之不亦威而不猛乎成王將冠周公使祝雍祝王曰逹而勿多也祝雍曰使王近於民逺於佞嗇於時恵於財任賢使能於此始成之時祝辭四加而後退公冠自以為主卿為賔饗之以三獻之禮公始加玄端與皮弁皆必朝服玄冕四加諸侯太子庶子冠公為主其禮與上同冠於祖廟曰令月吉日加子元服去爾㓜志順爾成徳冠禮十九見正而冠古之通禮也夏公如齊逆女何以書親迎禮也其禮奈何曰諸侯以屨二兩加琮大夫庶人以屨二兩加束脩二曰某國寡小君使寡人奉不珍之琮不珍之屨禮夫人貞女夫人曰有幽室數辱之産未諭於傅母之教得承執衣裳之事敢不敬拜祝祝答拜夫人受琮取一兩屨以履女正笄衣裳而命之曰徃矣善事爾舅姑以順為宫室無二爾心無敢回也女拜乃親引其手授夫乎户夫引手出户夫行女從拜辭父于堂拜諸母於大門夫先升輿執轡女乃升輿轂三轉然後夫下先行大夫士庶人稱其父曰某之父某之師友使某執不珍之屨不珍之束脩敢不敬禮某氏貞女母曰有草茅之産未習於織紝紡績之事得奉執箕箒之事敢不敬拜春秋曰壬申公薨于髙寢傳曰髙寢者何正寢也曷爲或言髙寢或言路寢曰諸侯正寢三一曰髙寢二曰左路寢三曰右路寢髙寢者始封君之寢也二路寢者繼體之君寢也其二何曰子不居父之寢故二寢繼體君世世不可居髙祖之寢故有髙寢名曰髙也路寢其立奈何髙寢立中路寢左右春秋曰天王入于成周傳曰成周者何東周也然則天子之寢奈何曰亦三承明繼體守文之君之寢曰左右之路寢謂之承明何曰承乎明堂之後者也故天子諸侯三寢立而名實正父子之義章尊卑之事别大小之徳異矣天子以鬯為贄鬯者百草之本也上暢於天下暢於地無所不暢故天子以鬯為贄諸侯以圭為贄圭者玉也薄而不撓亷而不劌有瑕於中必見於外故諸侯以玉為贄卿以羔為贄羔者羊也羊羣而不黨故卿以為贄大夫以鴈為贄鴈者行列有長㓜之禮故大夫以為贄士以雉為贄雉者不可指食籠狎而服之故士以雉為贄庶人以鶩為贄鶩者鶩鶩也鶩鶩無它心故庶人以鶩為贄贄者所以質也諸侯三年一貢士士一適謂之好徳再適謂之尊賢三適謂之有功有功者天子一賜以輿服弓矢再賜以鬯三賜以虎賁百人號曰命諸侯命諸侯者鄰國有臣弑其君孽弑其宗雖不請乎天子而征之可也已征而歸其地于天子諸侯貢士一不適謂之過再不適謂之慠三不適謂之誣誣者天子黜之一黜以爵再黜以地三黜而地畢諸侯有不貢士謂之不率正不率正者天子黜之一黜以爵再黜以地三黜而地畢然後天子比年秩官之無文者而黜之以諸侯之所貢士代之詩云濟濟多士文王以寧此之謂也古者必有命民命民能敬長憐孤取舎好讓居事力者命於其君命然後得乗飭輿駢馬未得命者不得乗乗者皆有罰故其民雖有餘財侈物而無仁義功徳則無所用其餘財侈物故其民皆興仁義而賤財利賤財利則不爭不爭則强不凌弱衆不暴寡是唐虞所以興象刑而民莫敢犯法而亂斯止矣詩云告爾民人謹爾侯度用戒不虞此之謂也天子曰巡狩諸侯曰述職巡狩者巡其所守也述職者述其所職也春省耕助不給也秋省斂助不足也天子五年一巡狩歳二月東巡狩至于東嶽柴而望祀山川見諸侯問百年者命太師陳詩以觀民風命市納賈以觀民之所好惡志滛好僻者命典禮考時月定日同律禮樂制度衣服正之山川神祇有不舉者為不敬不敬者君黜以爵宗廟有不順者為不孝不孝者君削其地有功澤於民者然後加地入其境土地辟除敬老尊賢則有慶益其地入其境土地荒穢遺老失賢掊克在位則有讓削其地一不朝者黜其爵再不朝者黜其地三不朝者以六師移之歳五月南巡狩至于南嶽如東巡狩之禮歳八月西巡狩至于西嶽如南巡狩之禮歳十一月北巡狩至于北嶽如西巡狩之禮歸格于祖禰用特春秋曰正月公狩于郎傳曰春曰蒐夏曰苖秋曰獮冬曰狩苖者奈何曰苖者毛也取之不圍澤不揜羣取禽不麛卵不殺孕重者春蒐者不殺小麛及孕重者冬狩皆取之百姓皆出不失其馳不抵禽不詭遇逐不出防此苖獮蒐狩之義也故苖獮蒐狩之禮簡其戎事也故苖者毛取之蒐者捜索之狩者守留之夏不田何也曰天地隂陽盛長之時猛獸不攫鷙鳥不搏蝮蠆不螫鳥獸䖝虵且知應天而况人乎哉是以古者必有豢牢其謂之畋何聖人舉事必反本五穀者以奉宗廟養萬民也去禽獸害稼穡者故以田言之聖人作名號而事義可知也天子諸侯無事則歳三田一為乾豆二為賔客三為充君之庖無事而不田曰不敬田不以禮曰暴天物天子不合圍諸侯不揜羣天子殺則下大緌諸侯殺則下小緌大夫殺則止佐轝佐轝止則百姓畋獵獺祭魚然後漁人入澤梁鳩化為鷹然後設罻羅草木零落然後入山林昆䖝不蟄不以火田不麛不卵不夭殀不覆巢此皆聖人在上君子在位能者在職大徳之發者也是故臯陶為大理平民各服得其實伯夷主禮上下皆讓倕為工師百工致功益主虞山澤辟成棄主稷百榖時茂契主司徒百姓親和龍主賔客逺人至十二牧行而九州莫敢僻違禹陂九澤通九道定九州各以其職來貢不失厥宜方五千里至于荒服南撫交趾大發西析支渠捜氐羌北至山戎肅慎東至長夷島夷四海之内皆戴帝舜之功於是禹乃興九韶之樂致異物鳯凰來翔天下明徳也射者必心平體正持弓矢審固然後射者能以中詩云大侯既抗弓矢斯張射夫既同獻爾發功此之謂也弧之為言豫也豫者豫吾意也故古者兒生三日桑弧蓬矢六射天地四方天地四方者男子之所有事也必有意其所有事然後敢食榖故曰不素飱兮此之謂也生而相與交通故曰留賔自天子至士各有次贈死不及柩尸弔生不及悲哀非禮也故古者吉行五十里奔喪百里贈賵及事之謂時時禮之大者也春秋曰天王使宰咺来歸恵公仲子之賵賵者何喪事有賵者盖以乗馬束帛輿馬曰賵貨財曰賻衣𬒳曰襚口實曰唅玩好曰贈知生者賻賵知死者贈襚贈襚所以送死也賻賵所以佐生也輿馬束帛貨財衣被玩好其數奈何曰天子乗馬六匹諸侯四匹大夫三匹元士二匹下士一匹天子束帛五匹玄三纁二各五十尺諸侯玄三纁二各三十尺大夫玄一纁二各三十尺元士玄一纁一各二丈下士綵縵各一匹庶人布帛各一匹天子之賵乗馬六匹乗車諸侯四匹乗輿大夫曰參輿元士下士不用輿天子文繡衣各一襲到地諸侯覆跗大夫到踝士到髀天子唅實以珠諸侯以玉大夫以璣士以貝庶人以穀實位尊徳厚及親者賻賵唅襚厚貧富亦有差二三四五之數取之天地而制竒偶度人情而出節文謂之有因禮之大宗也春秋曰庚戌天王崩傳曰天王何以不書葬天子記崩不記葬必其時也諸侯記卒記葬有天子在不必其時也必其時奈何天子七日而殯七月而葬諸侯五日而殯五月而葬大夫三日而殯三月而葬士庶人二日而殯二月而葬皆何以然曰禮不豫凶事死而後治凶服衣衰飾脩棺椁作穿窆宅兆然後䘮文成外親畢至葬墳集孝子忠臣之恩厚備盡矣故天子七月而葬同軌畢至諸侯五月而葬同㑹畢至大夫三月而葬同朝畢至士庶人二月而葬外姻畢至也延陵季子適齊於其反也其長子死於嬴博之間因葬焉孔子聞之曰延陵季子吳之習於禮者也使子貢往而觀之其穿深不至泉其歛以時服既葬封壙墳掩坎其髙可隠也既封左袒右旋其封且號者三言曰骨肉歸復于土命也若魂氣則無不之也無不之也而遂行孔子曰延陵季子於禮其合矣子生三年然後免於父母之懐故制䘮三年所以報父母之恩也期年之䘮通乎諸侯三年之䘮通乎天子禮之經也子夏三年之䘮畢見於孔子孔子與之琴使之絃援琴而絃衎衎而樂作而曰先王制禮不敢不及也子曰君子也閔子騫三年之䘮畢見於孔子孔子與之琴使之絃援琴而絃切切而悲作而曰先王制禮不敢過也孔子曰君子也子貢問曰閔子哀不盡子曰君子也子夏哀已盡子曰君子也賜也惑敢問何謂孔子曰閔子哀未盡能㫁之以禮故曰君子也子夏哀已盡能引而致之故曰君子也夫三年之䘮固優者之所屈劣者之所勉齊宣王謂田過曰吾聞儒者喪親三年喪君三年君與父孰重田過對曰殆不如父重王忿然怒曰然則何為去親而事君田過對曰非君之土地無以䖏吾親非君之禄無以養吾親非君之爵位無以尊顯吾親受之君致之親凡事君所以為親也宣王邑邑而無以應古者有菑者謂之厲君一時素服使有司弔死問疾憂以巫毉匍匐以救之湯粥以方之善者必先乎矜寡孤獨及病不能相養死無以葬埋則葬埋之有親喪者不呼其門有齊衰大功五月不服力役之征有小功之喪者未葬不服力役之征其有重尸多死者急則有聚衆童子撃鼔苣火入官宫里用之各撃鼔苣火逐官宫里家之主人冠立于阼事畢出乎里門出乎邑門至野外此匍匐救厲之道也師大敗亦然齋者思其居䖏也思其笑語也思其所為也齋三日乃見其所為齋者祭之日將入户僾然若有見乎其容盤旋出户喟然若有聞乎歎息之聲先人之色不絶於目聲音咳唾不絶於耳嗜欲好惡不忘於心是則孝子之齋也春祭曰祠夏祭曰禴秋祭曰嘗冬祭曰烝春薦韭卵夏薦麥魚秋薦黍豚冬薦稻鴈三歳一祫五年一禘祫者合也禘者諦也祫者大合祭於祖廟也禘者諦其徳而差優劣也聖主將祭必潔齋精思若親之在方興未登㥥㥥憧憧専一想親之容貌彷彿此孝子之誠也四方之助祭空而来者滿而反虚而至者實而還皆取法則焉韓褐子濟於河津人告曰夫人過於此者未有不快用者也而子不用乎韓褐子曰天子祭海内之神諸侯祭封域之内大夫祭其親士祭其祖禰褐也未得事河伯也津人申楫舟中水而運津人曰向也役人固已告矣夫子不聽役人之言也今舟中水而運甚殆治裝衣而下逰乎韓子曰吾不為人之惡我而改吾志不為我將死而改吾義言未已舟泆然行韓褐子曰詩云莫莫葛藟施于條枚愷悌君子求福不回鬼神且不回况於人乎孔子曰無體之禮敬也無服之䘮憂也無聲之樂懽也不言而信不動而威不施而仁志也鍾鼓之聲怒而撃之則武憂而撃之則悲喜而撃之則樂其志變其聲亦變其志誠通乎金石而况人乎公孟子髙見顓孫子莫曰敢問君子之禮何如顓孫子莫曰去爾外厲與爾内色勝而心自取之去三者而可矣公孟不知以告曾子曾子愀然逡巡曰大哉言乎夫外厲者必内折色勝而心自取之者必為人役是故君子徳行成而容不知聞識博而辭不爭知慮微逹而能不愚曾子有疾孟儀往問之曾子曰鳥之將死必有悲聲君子集大辟必有順辭禮有三儀知之乎對曰不識也曾子曰坐吾語汝君子脩禮以立志則貪慾之心不來君子思禮以脩身則怠惰慢易之節不至君子脩禮以仁義則忿爭暴亂之辭逺若夫置罇爼列籩豆此有司之事也君子雖勿能可也孔子曰可也簡簡者易野也易野者無禮文也孔子見子桑伯子子桑伯子不衣冠而䖏弟子曰夫子何為見此人乎曰其質美而無文吾欲説而文之孔子去子桑伯子門人不説曰何為見孔子乎曰其質美而文繁吾欲説而去其文故曰文質脩者謂之君子有質而無文謂之易野子桑伯子易野欲同人道於牛馬故仲弓曰太簡上無明天子下無賢方伯天下為無道臣弑其君子弑其父力能討之討之可也當孔子之時上無明天子也故言雍也可使南面南面者天子也雍之所以得稱南面者問子桑伯子於孔子孔子曰可也簡仲弓曰居敬而行簡以道民不亦可乎居簡而行簡無乃太簡乎子曰雍之言然仲弓通於化術孔子明於王道而無以加仲弓之言孔子至齊郭門之外遇一嬰兒挈一壺相與俱行其視精其心正其行端孔子謂御曰趣驅之趣驅之韶樂方作孔子至彼聞韶三月不知肉味故樂非獨以自樂也又以樂人非獨以自正也又以正人矣哉於此樂者不圖為樂至於此黄帝詔伶倫作為音律伶倫自大夏之西乃之崑崙之隂取竹於嶰谷以生竅厚薄均者斷兩節間其長九寸而吹之以為黄鍾之宫日含少次制十二管以崑崙之下聴鳯之鳴以别十二律其雄鳴為六雌鳴亦六以比黄鍾之宫適合黄鍾之宫皆可生之而律之本也故曰黄鍾微而均鮮全而不傷其為宫獨尊象大聖之徳可以明至賢之功故奉而薦之于宗廟以歌迎功徳世世不忘是故黄鍾生林鍾林鍾生大吕大吕生夷則夷則生太簇太簇生南吕南吕生夾鍾夾鍾生無射無射生沽洗沽洗生應鍾應鍾生蕤賔三分所生益之一分以上生三分所生去其一分以下生黄鍾大吕太簇夾鍾沽洗仲吕蕤賔為上林鍾夷則南吕無射應鍾為下大聖至治之世天地之氣合以生風日至則日行其風以生十二律故仲冬短至則生黄鍾季冬生大吕孟春生太簇仲春生夾鍾季春生沽洗孟夏生仲吕仲夏生蕤賔季夏生林鍾孟秋生夷則仲秋生南吕季秋生無射孟冬生應鍾天地之風氣正十二律至也聖人作為鞉鼓控掲塤箎此六者徳音之音然後鍾磬竽瑟以和之然後干戚旄狄以舞之此所以祭先王之廟也此所以獻酢酳酬也所以官序貴賤各得其宜也此可以示後世有尊卑長㓜之序也鍾聲鏗鏗以立號號以立横横以立武君子聴鍾聲則思武臣石聲磬磬以立辯辯以致死君子聴磬聲則思死封疆之臣絲聲哀哀以立亷亷以立志君子聴琴瑟之聲則思志義之臣竹聲濫濫以立㑹㑹以聚衆君子聴竽笙簫管之聲則思畜聚之臣鼓鞞之聲懽懽以立動動以進衆君子聴鼓鞞之聲則思將帥之臣君子之聴音非聴其鏗鏘而已彼亦有所合之也樂者聖人之所樂也而可以善民心其感人深其移風易俗故先王著其教焉夫民有血氣心知之性而無哀樂喜怒之常應感起物而動然後心術形焉是故感激憔悴之音作而民思憂嘽奔慢易繁文簡節之音作而民康樂粗厲猛奮廣賁之音作而民剛毅亷直勁正莊誠之音作而民肅敬寛裕肉好順成和動之音作而民慈愛流僻邪散狄成滌濫之音作而民淫亂是故先王本之情性稽之度數制之禮義含生氣之和道五常之行使陽而不散隂而不密剛氣不怒柔氣不懾四暢交於中而發作於外皆安其位不相奪也然後立之學等廣其節奏省其文彩以繩徳厚律小大之稱比終始之序以象事行使親䟽貴賤長㓜男女之理皆形見於樂故曰樂觀其深矣土弊則草木不長水煩則魚鼈不大氣衰則生物不遂世亂則禮慝而樂淫是故其聲哀而不莊樂而不安慢易以犯節流漫以忘本廣則容姦狹則思欲感滌蕩之氣而滅和平之徳是以君子賤之也凡姦聲感人而逆氣應之逆氣成象而淫樂興焉正聲感人而順氣應之順氣成象而和樂興焉唱和有應回邪曲直各歸其分而萬物之理以類相動也是故君子反情以和其志比類以成其行姦聲亂色不習於聴淫樂慝禮不接心術惰慢邪辟之氣不設於身體使耳目鼻口心智百體皆由順正以行其義然後發以聲音文以琴瑟動以干戚飾以羽旄從以簫管奮至徳之光動四氣之和以著萬物之理是故清明象天廣大象地終始象四時周旋象風雨五色成文而不亂八風從律而不姦百度得數而有常小大相成終始相生唱和清濁代相為經故樂行而倫清耳目聡明血氣和平移風易俗天下皆寧故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂是故君子反情以和其意廣樂以成其教故樂行而民向方可以觀徳矣徳者性之端也樂者徳之華也金石絲竹樂之器也詩言其志歌詠其聲舞動其容三者本於心然後樂氣從之是故情深而文明氣盛而化神和順積中而英華發外惟樂不可以為偽樂者心之動也聲者樂之象也文彩節奏聲之飾也君子之動本樂其象也後治其飾是故先鼔以警戒三歩以見方再始以著往復亂以飾歸奮疾而不㧞極幽而不隠獨樂其志不厭其道備舉其道不私其欲是故情見而義立樂終而徳尊君子以好善小人以飾聽過故曰生民之道樂為大焉樂之可密者琴㝡宜焉君子以其可脩德故近之凡音之起由人心生也人心之動物使之然也感於物而後動故形於聲聲相應故生變變成方謂之音比音而樂之及干戚羽旄謂之樂樂者音之所由生也其本在人心之感於物是故其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲壯以厲其敬心感者其聲直以亷其愛心感者其聲和以調人之善惡非性也感於物而後動是故先王慎所以感之故禮以定其意樂以和其性政以一其行刑以防其姦禮樂刑政其極一也所以同民心而立治道也凡音生人心者也情動於中而形於聲聲成文謂之音是故治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困聲音之道與政通矣宫為君商為臣角為民徴為事羽為物五音亂則無法無法之音宫亂則荒其君驕商亂則陂其官壊角亂則憂其民怨徴亂則哀其事勤羽亂則危其財匱五者皆亂代相凌謂之慢如此則國之滅亡無日矣鄭衛之音亂世之音也比於慢矣桑間濮上之音亡國之音也其政散其民流誣上行私而不可止也凡人之有患禍者生於淫泆暴慢淫泆暴慢之本生於飲酒故古者慎其飲酒之禮使耳聴雅音目視正儀足行正容心論正道故終日飲酒而無過失近者數日逺者數月皆人有徳焉以益善詩云既醉以酒既飽以徳此之謂也凡從外入者莫深於聲音變人㝡極故聖人因而成之以徳曰樂樂者徳之風詩曰威儀抑抑徳音秩秩謂禮樂也故君子以禮正外以樂正内内須㬰離樂則邪氣生矣外須㬰離禮則慢行起矣故古者天子諸侯聴鍾聲未嘗離於庭卿大夫聴琴瑟未嘗離於前所以養正心而滅淫氣也樂之動於内使人易道而好良樂之動於外使人温恭而文雅雅頌之聲動人而正氣應之和成容好之聲動人而和氣應之粗厲猛賁之聲動人而怒氣應之鄭衛之聲動人而淫氣應之是以君子慎其所以動人也子路鼓瑟有北鄙之聲孔子聞之曰信矣由之不才也冉有侍孔子曰求來爾奚不謂由夫先王之制音也奏中聲為中節流入於南不歸於北南者生育之鄉北者殺伐之域故君子執中以為本務生以為故其音温和而居中以象生育之氣憂哀悲痛之感不加乎心暴厲淫荒之動不存乎體夫然者乃治存之風安樂之為也彼小人則不然執末以論本務剛以為故其音湫厲而微末以象殺伐之氣和節中正之感不加乎心温儼恭莊之動不存乎體夫殺者乃亂亡之風奔北之為也昔舜造南風之聲其興也勃焉至今王公述而不釋紂為北鄙之聲其廢也忽焉至今王公以為笑彼舜以匹夫積正合仁履中行善而卒以興紂以天子好慢淫荒剛厲暴賊而卒以滅今由也匹夫之徒布衣之醜也既無意乎先王之制而又有亡國之聲豈能保七尺之身哉冉有以告子路子路曰由之罪也小人不能耳陷而入於斯宜矣夫子之言也遂自悔不食七日而骨立焉孔子曰由之改過矣, WYG: ''}
