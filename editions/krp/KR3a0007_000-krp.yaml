body:
  text: 南豊曽鞏劉向所序說苑二十篇崇文總目云今存者五篇餘皆亡臣從士大夫間得之者十有五篇與舊為二十五篇正其脫􅍝疑者闕之而叙其目曰向采傳記百家所載行事之迹以為此書奏之欲以為法戒然其所取或有不當於理故不得而不論也夫學者之於道非知其大略之難也知其精微之際固難矣孔子之徒三千其顯者七十二人皆髙世之材也然獨稱顔氏之子其殆庶㡬乎及回死又以為無好學者而回亦稱夫子曰仰之彌髙鑚之彌堅子貢又以謂夫子之言性與天道不可得而聞也則其精微之際固難知久矣是以取舎不能無失於其間也故曰學然後知不足豈虚言哉向之學博矣其著書及建言尤欲有為扵世忘其枉已而為之者有矣何其徇物者多而自為者少也盖古之聖賢非不欲有為也然而曰求之有道得之有命故孔子所至之邦必聞其政而子貢以謂非夫子之求之也豈不求之有道哉子曰道之將行也歟命也道之将廢也歟命也豈不得之有命哉令向知岀此安扵行止以彼其志能擇其所學其盡乎精微則其所至未可量也是以夫子稱古之學者為已孟子稱君子欲其自得之自得之則取諸左右逢其原豈汲汲扵外哉向之得失如此亦學者之戒也故見之叙論令讀其書者知考而擇之也然向數困扵䜛而不改其操與夫患失者異矣可謂有志者也目錄卷第一君道卷第二臣術卷第三建本卷第四立節卷第五貴徳卷第六復恩卷第七政理卷第八尊賢卷第九正諫卷第十敬慎卷十一善説卷十二奉使卷十三權謀卷十四至公卷十五指武卷十六叢談卷十七雜言卷十八辨物卷十九修文卷二十反質護左都水使者光禄大夫臣向言所校中書說苑雜事及臣向書民間書誣校讎其事類衆多章句相溷或上下􅍝亂難分别次序除去與新序復重者其餘者淺薄不中義理别集以為百家後令以類相從一一條别篇目更以造新事十萬言以上凡二十篇七百八十四章號曰新苑皆可觀臣向昧死
