body:
  text: 建本孔子曰君子務本本立而道生夫本不正者末必陭始不盛者終必衰詩云原隰既平泉流既清本立而道生春秋之義有正春者無亂秋有正君者無危國易曰建其本而萬物理失之毫釐差以千里是故君子貴建本而重立始魏武侯問元年於吳子吳子對曰言國君必慎始也慎始奈何曰正之正之奈何曰明智智不明何以見正多聞而擇焉所以明智也是故古者君始聽治大夫而一言士而一見庶人有謁必達公族請問必語四方至者勿距可謂不壅蔽矣分祿必及用刑必中君心必仁思民之利除民之害可謂不失民眾矣君身必正近臣必選大夫不兼官執民柄者不在一族可謂不權勢矣此皆春秋之意而元年之本也孔子曰行身有六本本立焉然後為君子立體有義矣而孝為本處喪有禮矣而哀為本戰陳有隊矣而勇為本治政有理矣而能為本居國有禮矣而嗣為本生才有時矣而力為本置本不固無務豐末親戚不悅無務外交事無終始無務多業聞記不言無務多談比近不說無務修遠是以反本脩邇君子之道也天之所生地之所養莫貴乎人人之道莫大乎父子之親君臣之義父道聖子道仁君道義臣道忠賢父之於子也慈惠以生之教誨以成之養其義藏其偽時其節慎其施子年七歲以上父為之擇明師選良友勿使見惡少漸之以善使之早化故賢子之事親發言陳辭應對不悖乎耳趣走進退容貌不悖乎目卑體賤身不悖乎心君子之事親以積德子者親之本也無所推而不從命推而不從命者惟害親者也故親之所安子皆供之賢臣之事君也受官之日以主為父以國為家以士人為兄弟故苟有可以安國家利民人者不避其難不憚其勞以成其義故其君亦有助之以遂其德夫君臣之與百姓轉相為本如循環無端夫子亦云人之行莫大於孝孝行成於內而嘉號布於外是謂建之於本而榮華自茂矣君以臣為本臣以君為本父以子為本子以父為本棄其本者榮華稿矣子路曰負重道遠者不擇地而休家貧親老者不擇祿而仕昔者由事二親之時常食藜藿之實而為親負米百里之外親沒之後南遊於楚從車百乘積粟萬鍾累茵而坐列鼎而食願食藜藿為親負米之時不可復得也枯魚銜索幾何不蠹二親之壽忽如過隙草木欲長霜露不使賢者欲養二親不待故曰家貧親老不擇祿而仕也伯禽與康叔封朝于成王見周公三見而三笞康叔有駭色謂伯禽曰有商子者賢人也與子見之康叔封與伯禽見商子曰某某也日吾二子者朝乎成王見周公三見而三笞其說何也商子曰二子盍相與觀乎南山之陽有木焉名曰橋二子者往觀乎南山之陽見橋竦焉實而仰反以告乎商子商子曰橋者父道也商子曰二子盍相與觀乎南山之陰有木焉名曰梓二子者往觀乎南山之陰見梓勃焉實而俯反以告商子商子曰梓者子道也二子者明日見乎周公入門而趨登堂而跪周公拂其首勞而食之曰爾安見君子二子對曰見商子周公曰君子哉商子也曾子芸瓜而誤斬其根曾晳怒援大杖擊之曾子仆地有頃乃蘇蹶然而起進曰曩者參得罪於大人大人用力教參得無疾乎退屏鼓琴而歌欲令曾晳聽其歌聲令知其平也孔子聞之告門人曰參來勿內也曾子自以無罪使人謝孔子孔子曰汝聞瞽叟有子名曰舜舜之事父也索而使之未嘗不在側求而殺之未嘗可得小箠則待大箠則走以逃暴怒也今子委身以待暴怒立體而不去殺身以陷父不義不孝孰是大乎汝非天子之民耶殺天子之民其罪奚如以曾子之材又居孔氏之門有罪不自知處義難乎韓伯俞有過其母笞之泣其母問曰他日笞子未嘗見泣今泣何也對曰他日俞得罪笞嘗痛今母之力衰笞不能使痛是以泣也故曰父母怒之不作於意不見於色深受其罪使可哀憐上也父母怒之不作於意不見於色其次也父母怒之作於意見於色下也成人有德小子有造大學之教也時禁於其未發之曰預因其可之曰時相觀於善之曰磨學不陵節而施之曰馴發然後禁則扞格而不勝時過然後學則勤苦而難成雜施而不遜則壞亂而不治獨學而無友則孤陋而寡聞故曰有昭辟雍有賢泮宮田里周行濟濟鏘鏘而相從執質有族以文周召公年十九見正而冠冠則可以為方伯諸侯矣人之幼稚童蒙之時非求師正本無以立身全性夫幼者必愚愚者妄行愚者妄行不能保身孟子曰人皆知以食愈飢莫知以學愈愚故善材之幼者必勤於學問以修其性今人誠能砥礪其材自誠其神明睹物之應通道之要觀始卒之端覽無外之境逍遙乎無方之內彷徉乎塵埃之外卓然獨立超然絕世此上聖之所遊神也然晚世之人莫能閒居心思鼓琴讀書追觀上古友賢大夫學問講辨日以自虞䟽遠世事分明利害籌策得失以觀禍福設義立度以為法式窮追本末究事之情死有遺業生有榮名此皆人材之所能建也然莫能為者偷慢懈墮多暇日之故也是以失本而無名夫學者崇名立身之本也儀狀齊等而飾貌者好質性同倫而學問者智是故砥礪琢磨非金也而可以利金詩書辟立非我也而可以厲心夫問訊之士日夜興起厲中益知以分別理是故處身則全立身不殆士苟欲深明博察以垂榮名而不好問訊之道則是伐智本而塞智原也何以立軀也騏驥雖疾不遇伯樂不致千里干將雖利非人力不能自斷焉烏號之弓雖良不得排檠不能自任人才雖高不務學問不能致聖水積成川則蛟龍生焉土積成山則豫樟生焉學積成聖則富貴尊顯至焉千金之裘非一狐之皮也臺廟之榱非一木之枝也先王之法非一士之智也故曰訊問者智之本思慮者智之道也中庸曰好問近乎智力行近乎仁知恥近乎勇積小之能大者其惟仲尼乎學者所以反情治性盡才者也親賢學問所以長德也論交合友所以相致也詩云如切如瑳如琢如磨此之謂也今夫辟地殖穀以養生送死銳金石雜草藥以攻疾苦知構室屋以避暑雨累臺榭以避潤濕入知親其親出知尊其君內有男女之別外有朋友之際此聖人之德教儒者受之傳之以教誨於後世今夫晚世之惡人反非儒者曰何以儒為如此人者是非本也譬猶食穀衣絲而非耕織者也載於船車服而安之而非工匠者也食於釜甑須以生活而非陶冶者也此言違於情而行矇於心者也如此人者骨肉不親也秀士不友也此三代之棄民也人君之所不赦也故詩云投畀豺虎豺虎不食投畀有北有北不受投畀有昊此之謂也孟子曰人知糞其田莫知糞其心糞田莫過利苗得粟糞心易行而得其所欲何為糞心博學多聞何為易行一性止淫也子思曰學所以益才也礪所以致刃也吾嘗幽處而深思矣不若學之速也吾嘗跂而望矣不若登高之博見也故順風而呼聲不加疾而聞者眾登丘而招臂不加長而見者遠故魚乘於水鳥乘於風草木乘於時孔子曰可以與言終日而不倦者其惟學乎其身體不足觀也其勇力不足憚也其先祖不足稱也其族姓不足道也然而可以聞於四方而昭於諸侯者其惟學乎詩曰不愆不亡率由舊章夫學之謂也孔子曰鯉乎君子不可以不學見人不可以不飾不飾則無根無根則失理失理則不忠不忠則失禮失禮則不立夫遠而有光者飾也近而逾明者學也譬之如污池水潦注焉菅蒲生之從上觀之知其非源也公扈子曰有國者不可以不學春秋生而尊者驕生而富者傲生而富貴又無鑑而自得者鮮矣春秋國之鑑也春秋之中弒君三十六亡國五十二諸侯奔走不得保其社稷者甚眾未有不先見而後從之者也晉平公問於師曠曰吾行年七十欲學恐已暮矣師曠曰暮何不炳燭乎平公曰安有為人臣而戲其君乎師曠曰盲臣安敢戲其君乎臣聞之少而好學如日出之陽壯而好學如日中之光老而好學如炳燭之明老而不學昧昧如夜行焉炳燭之明孰與昧行乎平公曰善哉河間獻王曰湯稱學聖王之道者譬如日焉靜居獨思譬如火焉夫捨學聖王之道若捨日之光何乃獨思若火之明也可以見小耳未可用大知惟學問可以廣明德慧也梁丘據謂晏子曰吾至死不及夫子矣晏子曰嬰聞之為者常成行者常至嬰非有異於人也常為而不置常行而不休者故難及也甯越中牟之鄙人也苦耕稼之勞謂其友曰何為而可以免此苦也其友曰莫如學學三十年則可以達矣甯越曰請以十五歲人將休吾將不敢休人將臥吾將不敢臥十五歲學而周威公師之夫走者之速也而過二里止步者之遲也而百里不止今以甯越之材而久不止其為諸侯師豈不宜哉孔子謂子路曰汝何好子路曰好長劍孔子曰非此之問也謂以汝之所能加之以學豈可及哉子路曰學亦有益乎孔子曰夫人君無諫臣則失政士無教友則失聽御狂馬不釋其策操弓不返於檠木受繩則直人受諫則聖受學重問孰不順成毀仁惡士且近於刑君子不可以不學子路曰南山有竹弗揉自直斬而射之通於犀革又何學為乎孔子曰括而羽之鏃而砥礪之其入不益深乎子路再拜曰敬受教哉子路問於孔子曰請釋古之學而行由之意可乎孔子曰不可昔者東夷之子慕諸夏之義有女其夫死為之內私壻終身不嫁不嫁則不嫁矣然非貞節之義也蒼梧之弟娶妻而美好請與兄易忠則忠矣然非禮也今子欲釋古之學而行子之意庸知子之意不以用非為是用是為非乎不順其初雖欲悔之難哉豐墻墝下未必崩也流潦至壞必先矣樹本淺根垓不深未必橛也飄風起暴雨至拔必先矣君子居於是國不崇仁義不尊賢臣未必亡也然一旦有非常之變車馳人走指而禍至乃始憂愁乾喉燋脣仰天而歎庶幾焉天其救之不亦難乎孔子曰不慎其前而悔其後雖悔無及矣詩云啜其泣矣何嗟及矣言不先正本而成憂於末也虞君問盆成子曰今工者久而巧色者老而衰今人不及壯之時益積心技之術以備將衰之色色者必盡乎老之前知謀無以異乎幼之時可好之色彬彬乎且盡洋洋乎安託無能之軀哉故有技者不累身而未嘗滅而色不得以常茂齊桓公問於管仲曰王者何貴曰貴天桓公仰而視天管仲曰所謂天者非謂蒼蒼莽莽之天也君人者以百姓為天百姓與之則安輔之則彊非之則危背之則亡詩云人而無良相怨一方民怨其上不遂亡者未之有也河間獻王曰管子稱倉廩實知禮節衣食足知榮辱夫穀者國家所以昌熾士女所以姣好禮義所以行而人心所以安也尚書五福以富為始子貢問為政孔子曰富之既富乃教之也此治國之本也文公見咎季其廟傅於西牆公曰孰處而西對曰君之老臣也公曰西益而宅對曰臣之忠不如老臣之力其牆壞而不築公曰何不築對曰一日不稼百日不食公出而告之僕僕頓首於軫曰呂刑云一人有慶兆民賴之君之明群臣之福也乃令於國曰毋淫宮室以妨人宅板築以時毋奪農功楚恭王多寵子而世子之位不定屈建曰楚必多亂夫一兔走於街萬人追之一人得之萬人不復走分未定則一兔走使萬人擾分已定則雖貪夫知止今楚多寵子而嫡位無主亂自是生矣夫世子者國之基也而百姓之望也國既無基又使百姓失望絕其本矣本絕則撓亂猶兔走也恭王聞之立康王為太子其後猶有令尹圍公子棄疾之亂也晉襄公薨嗣君少趙宣子相謂大夫曰立少君懼多難請立雍雍長出在秦秦大足以為援賈季曰不若公子樂樂有寵於國先君愛而仕之翟翟足以為援穆嬴抱太子以呼於庭曰先君奚罪其嗣亦奚罪舍嫡嗣不立而外求君乎出朝抱以見宣子曰惡難也故欲立長君長君立而少君壯難乃至矣宣子患之遂立太子也趙簡子以襄子為後董安于曰無恤不才今以為後何也簡子曰是其為人也能為社稷忍辱異日智伯與襄子飲而灌襄子之首大夫請殺之襄子曰先君之立我也曰能為社稷忍辱豈曰能刺人哉處十月智伯圍襄子於晉陽襄子䟽隊而擊之大敗智伯漆其首以為飲器
