body:
  text: 説苑儒家類提要臣等謹案説苑二十卷漢劉向撰凡二十篇隋唐志皆同崇文總目云今存者五篇餘皆亡曽鞏校書序云得十五篇於士大夫家與舊為二十篇晁公武讀書志云劉向説苑以君道臣術建本立節貴德復恩政理尊賢正諫法誡善説奉使權謀至公指武談叢襍言辨物修文為目陽嘉四年上之闕第二十卷曽子固所得之二十篇正是析十九卷作修文上下篇耳今本第十法誡篇作敬慎而修文篇後有反質篇陸游渭南集記李德芻之言謂得高麗所進本補成完書則宋時已有此本晁公武偶未見也其書皆錄遺聞佚事足為法戒之資者其體例一如新序葉大慶考古質疑摘其趙襄子賞晉陽之功孔子稱之一條諸御已諫楚莊王築臺引伍子胥一條晏子使吴見夫差一條晉太史屠餘與周桓公論晉平公一條晉勝智氏後闔閭襲郢一條楚左史倚相論越破吴一條晏子送曽子一條晉昭公時戰邲一條孔子對趙襄子一條皆時代先後邈不相及又介子推舟之僑並載其龍蛇之歌而之僑事尤舛黄朝英緗素襍記亦摘其固桑對晉平公論養士一條新序作舟人古乗對趙簡子又楚文王爵筦饒一條新序作楚共王爵筦蘓二書同出向手而自相矛盾殆捃拾衆説各據本文偶爾失於叅校也然古籍散佚多賴此以存如漢志河間獻王八篇隋志已不著錄而此書所載四條尚足見其議論醇正不愧儒宗其他亦多可採擇雖間有傳聞異詞固不以㣲瑕累全璧矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀説苑序劉向所序説苑二十篇崇文總目云今存者五篇餘皆亡臣從士大夫間得之者十有五篇與舊為二十篇正其脫謬疑者闕之而叙其篇目曰向采傳記百家所載行事之迹以為此書奏之欲以為法戒然其所取或有不當於理故不得而不論也夫學者之於道非知其大略之難也知其精微之際固難矣孔子之徒三千其顯者七十二人皆髙世之材也然獨稱顔氏之子其殆庶㡬乎及回死又以為無好學者而回亦稱夫子曰仰之彌髙鑽之彌堅子貢又以謂夫子之言性與天道不可得而聞也則其精㣲之際固難知乆矣是以取舎不能無失於其間也故曰學然後知不足豈虚言哉向之學博矣其著書及建言尤欲有為於世忘其枉已而為之者有矣何其徇物者多而自為者少也葢古之聖賢非不欲有為也然而曰求之有道得之有命故孔子所至之邦必聞其政而子貢以謂非夫子之求之也豈不求之有道哉子曰道之將行也歟命也道之將廢也歟命也豈不得之有命哉令向知出此安於行止以彼其志能擇其所學以盡乎精㣲則其所至未可量也是以夫子稱古之學者為已孟子稱君子欲其自得之自得之則取諸左右逢其原豈汲汲於外哉向之得失如此亦學者之戒也故見之叙論令讀其書者知考而擇之也然向數困於䜛而不改其操與夫患失者異矣可謂有志者也編校書籍臣曽鞏上欽定四庫全書
