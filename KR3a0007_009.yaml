body:
  text: 正諫易曰王臣蹇蹇匪躬之故人臣之所以蹇蹇為難而諫其君者非為身也將欲以匡君之過矯君之失也君有過失者危亡之萌也見君之過失而不諫是輕君之危亡也夫輕君之危亡者忠臣不忍為也三諫而不用則去不去則身亡身亡者仁人所不為也是故諫有五一曰正諫二曰降諫三曰忠諫四曰戇諫五曰諷諫孔子曰吾其從諷諫矣乎夫不諫則危君固諫則危身與其危君寧危身危身而終不用則諫亦無功矣智者度君權時調其緩急而處其宜上不敢危君下不以危身故在國而國不危在身而身不殆昔陳靈公不聽泄冶之諫而殺之曹羈三諫曹君不聽而去春秋序義雖俱賢而曹羈合禮齊景公遊於海上而樂之六月不歸令左右曰敢有先言歸者致死不赦顏燭趨進諫曰君樂治海上不樂治國而六月不歸彼儻有治國者君且安得樂此海也景公援戟將斫之顏燭趨進撫衣待之曰君奚不斫也昔者桀殺關龍逄紂殺王子比干君之賢非此二主也臣之材亦非此二子也君奚不斫以臣參此二人者不亦可乎景公說遂歸中道聞國人謀不內矣楚莊王立為君三年不聽朝乃令於國曰寡人惡為人臣而遽諫其君者今寡人有國家立社稷有諫則死無赦蘇從曰處君之高爵食君之厚祿愛其死而不諫其君則非忠臣也乃入諫莊王立鍾鼓之間左伏楊姬右擁越姬左裯衽右朝服曰吾鍾鼓之不暇何諫之聽蘇從曰臣聞之好道者多資好樂者多迷好道者多糧好樂者多亡荊國亡無日矣死臣敢以告王王曰善左執蘇從手右抽陰刀刎鍾鼓之懸明日授蘇從為相晉平公好樂多其賦斂不治城郭曰敢有諫者死國人憂之有咎犯者見門大夫曰臣聞主君好樂故以樂見門大夫入言曰晉人咎犯也欲以樂見平公曰內之止坐殿上則出鍾磬竽瑟坐有頃平公曰客子為樂咎犯對曰臣不能為樂臣善隱平公召隱士十二人咎犯曰隱臣竊顧昧死御平公曰諾咎犯申其左臂而詘五指平公問於隱官曰占之為何隱官皆曰不知平公曰歸之咎犯則申其一指曰是一也便游赭盡而峻城闕二也柱梁衣繡士民無褐三也侏儒有餘酒而死士渴四也民有飢色而馬有粟秩五也近臣不敢諫遠臣不得達平公曰善乃屏鍾鼓除竽瑟遂與咎犯參治國孟嘗君將西入秦賓客諫之百通則不聽也曰以人事諫我我盡知之若以鬼道諫我我則殺之謁者入曰有客以鬼道聞曰請客入客曰臣之來也過於淄水之上見一土耦人方與木梗人語木梗謂土耦人曰子先土也持子以為耦人遇天大雨水潦並至子必沮壞應曰我沮乃反吾真耳今子東園之桃也刻子以為人遇天大雨水潦並至必浮子泛泛乎不知所止今秦四塞之國也有虎狼之心恐其有木梗之患於是孟嘗君逡巡而退而無以應卒不敢西嚮秦吳王欲伐荊告其左右曰敢有諫者死舍人有少孺子者欲諫不敢則懷丸操彈遊於後園露沾其衣如是者三旦吳王曰子來何苦露沾衣如此對曰園中有樹其上有蟬蟬高居悲鳴飲露不知螳蜋在其後也螳蜋委身曲附欲取蟬而不知黃雀在其傍也黃雀延頸欲啄螳蜋而不知彈丸在其下也此三者皆務欲得其前利而不顧其後之有患也吳王曰善哉乃罷其兵楚莊王欲伐陽夏師久而不罷群臣欲諫而莫敢莊王獵於雲夢椒舉進諫曰王所以多得獸者馬也而王國亡王之馬豈可得哉莊王曰善不穀知詘強國之可以長諸侯也知得地之可以為富也而忘吾民之不用也明日飲諸大夫酒以椒舉為上客罷陽夏之師秦始皇帝太后不謹幸郎嫪毐封以為長信侯為生兩子毐專國事浸益驕奢與侍中左右貴臣俱博奕飲酒醉爭言而鬭瞋目大叱曰吾乃皇帝之假父也窶人子何敢乃與我亢所與鬭者走行白皇帝皇帝大怒毐懼誅因作亂戰咸陽宮毐敗始皇乃取毐四支車裂之取其兩弟囊撲殺之取皇太后遷之于萯陽宮下令曰敢以太后事諫者戮而殺之從蒺藜其脊肉幹四支而積之闕下諫而死者二十七人矣齊客茅焦乃往上謁曰齊客茅焦願上諫皇帝皇帝使使者出問客得無以太后事諫也茅焦曰然使者還白曰果以太后事諫皇帝曰走往告之若不見闕下積死人耶使者問茅焦茅焦曰臣聞之天有二十八宿今死者已有二十七人矣臣所以來者欲滿其數耳臣非畏死人也走入白之茅焦邑子同食者盡負其衣物行亡使者入白之皇帝大怒曰是子故來犯吾禁趣炊鑊湯煮之是安得積闕下乎趣召之入皇帝按劍而坐口正沫出使者召之入茅焦不肯疾行足趣相過耳使者趣之茅焦曰臣至前則死矣君獨不能忍吾須臾乎使者極哀之茅焦至前再拜謁起稱曰臣聞之夫有生者不諱死有國者不諱亡諱死者不可以得生諱亡者不可以得存死生存亡聖主所欲急聞也不審陛下欲聞之不皇帝曰何謂也茅焦對曰陛下有狂悖之行陛下不自知邪皇帝曰何等也願聞之茅焦對曰陛下車裂假父有嫉妬之心囊撲兩弟有不慈之名遷母萯陽宮有不孝之行從蒺藜於諫士有桀紂之治今天下聞之盡瓦解無嚮秦者臣竊恐秦亡為陛下危之所言已畢乞行就質乃解衣伏質皇帝下殿左手接之右手麾左右曰赦之先生起就衣今願受事乃立焦為仲父爵之為上卿皇帝立駕千乘萬騎空左方自行迎太后萯陽宮歸於咸陽太后大喜乃大置酒待茅焦及飲太后曰抗枉令直使敗更成安秦之社稷使妾母子復得相會者盡茅君之力也楚莊王築層臺延石千里延壤百里士有反三月之糧者大臣諫者七十二人皆死矣有諸御己者違楚百里而耕謂其耦曰吾將入見於王其耦曰以身乎吾聞之說人主者皆閒暇之人也然且至而死矣今子特草茅之人耳諸御己曰若與豫同耕則比力也至於說人主不與子比智矣委其耕而入見莊王莊王謂之曰諸御己來汝將諫邪諸御己曰君有義之用有法之行且己聞之土負水者平木負繩者正君受諫者聖君築層臺延石千里延壤百里民之釁咎血成於通塗然且未敢諫也己何敢諫乎顧臣愚竊聞昔者虞不用宮之奇而晉并之陳不用子家羈而楚并之曹不用僖負羈而宋并之萊不用子猛而齊并之吳不用子胥而越并之秦不用蹇叔之言而秦國危桀殺關龍逄而湯得之紂殺王子比干而武王得之宣王殺杜伯而周室卑此三天子六諸侯皆不能尊賢用辨士之言故身死而國亡遂趨而出楚王遽而追之曰己子反矣吾將用子之諫先日說寡人者其說也不足以動寡人之心又危加諸寡人故皆至而死今子之說足以動寡人之心又不危加諸寡人故吾將用子之諫明日令曰有能入諫者吾將與為兄弟遂解層臺而罷民楚人歌之曰薪乎萊乎無諸御己訖無子乎萊乎薪乎無諸御己訖無人乎齊桓公謂鮑叔曰寡人欲鑄大鍾昭寡人之名焉寡人之行豈避堯舜哉鮑叔曰敢問君之行桓公曰昔者吾圍談三年得而不自與者仁也吾北伐孤竹剗令支而反者武也吾為葵丘之會以偃天下之兵者文也諸侯抱美玉而朝者九國寡人不受者義也然則文武仁義寡人盡有之矣寡人之行豈避堯舜哉鮑叔曰君直言臣直對昔者公子糾在上位而不讓非仁也背太公之言而侵魯境非義也壇場之上詘於一劍非武也姪娣不離懷衽非文也凡為不善遍於物不自知者無天禍必有人害天處甚高其聽甚下除君過言天且聞之桓公曰寡人有過乎幸記之是社稷之福也子不幸教幾有大罪以辱社稷楚昭王欲之荊臺游司馬子綦進諫曰荊臺之游左洞庭之陂右彭蠡之水南望獵山下臨方淮其樂使人遺老而忘死人君游者盡以亡其國願大王勿往游焉王曰荊臺乃吾地也有地而游之子何為絶我游乎怒而擊之於是令尹子西駕安車四馬徑於殿下曰今日荊臺之游不可不觀也王登車而拊其背曰荊臺之游與子共樂之矣子西步馬十里引轡而止曰臣不敢下車願得有道大王肯聽之乎王曰第言之令尹子西曰臣聞之為人臣而忠其君者爵祿不足以賞也為人臣而諛其君者刑罰不足以誅也若司馬子綦者忠臣也若臣者諛臣也願大王殺臣之軀罰臣之家而祿司馬子綦王曰若我能止聽公子獨能禁我游耳後世游之無有極時奈何令尹子西曰欲禁後世易耳願大王山陵崩阤為陵於荊臺未嘗有持鍾鼓管絃之樂而游於父祖之墓上者也於是王還車卒不游荊臺令罷先置孔子從魯聞之曰美哉令尹子西諫之於十里之前而權之於百世之後者也荊文王得如黃之狗箘簬之矰以畋於雲夢三月不反得舟之姬淫朞年不聽朝保申諫曰先王卜以臣為保吉今王得如黃之狗箘簬之矰畋於雲夢三月不反及得舟之姬淫朞年不聽朝王之罪當笞匍伏將笞王王曰不穀免於襁褓託於諸侯矣願請變更而無笞保申曰臣承先王之命不敢廢也王不受笞是廢先王之命也臣寧得罪於王無負於先王王曰敬諾乃席王王伏保申束細箭五十跪而加之王背如此者再謂王起矣王曰有笞之名一也遂致之保申曰臣聞之君子恥之小人痛之恥之不變痛之何益保申趨出欲自流乃請罪於王王曰此不穀之過保將何罪王乃變行從保申殺如黃之狗折箘簬之矰逐舟之姬務治乎荊兼國三十令荊國廣大至於此者保申敢極言之功也蕭何王陵聞之曰聖主能奉先世之業而以成功名者其唯荊文王乎故天下譽之至今明主忠臣孝子以為法晉平公使叔嚮聘於吳吳人拭舟以逆之左五百人右五百人有繡衣而豹裘者有錦衣而狐裘者叔嚮歸以告平公平公曰吳其亡乎奚以敬舟奚以敬民叔嚮對曰君為馳底之臺上可以發千兵下可以陳鍾鼓諸侯聞君者亦曰奚以敬臺奚以敬民所敬各異也於是平公乃罷臺趙簡子舉兵而攻齊令軍中有敢諫者罪至死被甲之士名曰公盧望見簡子大笑簡子曰子何笑對曰臣有宿笑簡子曰有以解之則可無以解之則死對曰當桑之時臣鄰家夫與妻俱之田見桑中女因往追之不能得還反其妻怒而去之臣笑其曠也簡子曰今吾伐國失國是吾曠也於是罷師而歸景公為臺臺成又欲為鍾晏子諫曰君不勝欲為臺矣今復欲為鍾是重斂於民民之哀矣夫斂民之哀而以為樂不祥景公乃止景公有馬其圉人殺之公怒援戈將自擊之晏子曰此不知其罪而死臣請為君數之令知其罪而殺之公曰諾晏子舉戈而臨之曰汝為吾君養馬而殺之而罪當死汝使吾君以馬之故而殺圉人而罪又當死汝使吾君以馬故殺人聞於四鄰諸侯汝罪又當死公曰夫子釋之夫子釋之勿傷吾仁也景公好弋使燭雛主鳥而亡之景公怒而欲殺之晏子曰燭雛有罪三請數之以其罪乃殺之景公曰可於是乃召燭雛數之景公前曰汝為吾君主鳥而亡之是一罪也使吾君以鳥之故而殺人是二罪也使諸侯聞之以吾君重鳥而輕士是三罪也數燭雛罪已畢請殺之景公曰止勿殺而謝之景公正晝被髮乘六馬御婦人以出正閨刖跪擊其馬而反之曰爾非吾君也公慚而不朝晏子睹裔敖而問曰君何故不朝對曰昔者君正晝被髮乘六馬御婦人以出正閨刖跪擊其馬而反之曰爾非吾君也公慚而反不果出是以不朝晏子入見公曰昔者寡人有罪被髮乘六馬以出正閨刖跪擊其馬而反之曰爾非吾君也寡人以子大夫之賜得率百姓以守宗廟今見戮於刖跪以辱社稷吾猶可以齊於諸侯乎晏子對曰君無惡焉臣聞之下無直辭上有隱君民多諱言君有驕行古者明君在上下有直辭君上好善民無諱言今君有失行而刖跪有直辭是君之福也故臣來慶請賞之以明君之好善禮之以明君之受諫公笑曰可乎晏子曰可於是令刖跪倍資無正時朝無事景公飲酒夜移於晏子家前驅報閭曰君至晏子被玄端立於門曰諸侯得微有故乎國家得微有故乎君何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂之晏子對曰夫布薦席陳簠簋者有人臣不敢與焉公曰移於司馬穰苴之家前驅報閭曰君至司馬穰苴介胄操戟立於門曰諸侯得微有兵乎大臣得微有叛者乎君何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂之對曰夫布薦席陳簠簋者有人臣不敢與焉公曰移於梁丘據之家前驅報閭曰君至梁丘據左操瑟右挈竽行歌而至公曰樂哉今夕吾飲酒也微彼二子者何以治吾國微此一臣者何以樂吾身賢聖之君皆有益友無偷樂之臣景公弗能及故兩用之僅得不亡吳以伍子胥孫武之謀西破強楚北威齊晉南伐越越王勾踐迎擊之敗吳於姑蘇傷闔廬指軍卻闔廬病創將死謂太子夫差曰爾忘勾踐殺而父乎夫差對曰不敢忘是夕闔廬死夫差既立為王以伯嚭為太宰習戰射二年伐越敗越於夫湫越王勾踐乃以餘兵五千人棲於會稽山上使大夫種厚幣遺吳太宰嚭以請和求委國為臣妾吳王將許之伍子胥諫曰越王為人能辛苦今王不滅後必悔之吳王不聽用太宰嚭計與越平其後五年吳王聞齊景公死而大臣爭寵新君弱乃興師北伐齊子胥諫曰不可勾踐食不重味弔死問疾且能用人此人不死必為吳患今越腹心之疾也齊猶疥癬耳而王不先越乃務伐齊不亦繆乎吳王不聽伐齊大敗齊師於艾陵遂與鄒魯之君會以歸益疏子胥之言其後四年吳將復北伐齊越王勾踐用子貢之謀乃率其衆以助吳而重寶以獻遺太宰嚭太宰嚭既數受越賂其愛信越殊甚日夜為言於吳王吳王信用嚭之計伍子胥諫曰夫越腹心之疾今信其游辭僞詐而貪齊譬猶石田無所用之盤庚曰古人有顛越不恭劓殄滅之俾無遺育無使易種于茲邑是商所以興也願王釋齊而先越不然將悔之無及也已吳王不聽使子胥於齊子胥謂其子曰吾諫王王不我用吾今見吳之滅矣女與吾俱亡無為也乃屬其子於齊鮑氏而歸報吳王太宰嚭既與子胥有隙因讒曰子胥為人剛暴少恩其怨望猜賊為禍也深前日王欲伐齊子胥以為不可王卒伐之而有大功子胥恥其計謀不用乃反怨望今王又復伐齊子胥專愎強諫沮毀用事徼幸吳之敗以自勝其計謀耳今王自行悉國中武力以伐齊而子胥諫不用因輟謝佯病不行王不可不備此起禍不難且臣使人微伺之其使於齊也乃屬其子於鮑氏夫為人臣內不得意外交諸侯自以為先王謀臣今不見用常怏怏願王蚤圖之吳王曰微子之言吾亦疑之乃使使賜子胥屬鏤之劍曰子以此死子胥曰嗟乎讒臣嚭為亂王顧反誅我我令若父霸又若立時諸子弟爭立我以死爭之於先王幾不得立若既立欲分吳國與我我顧不敢當然若之何聽讒臣殺長者乃告舍人曰必樹吾墓上以梓令可以為器而抉吾眼著之吳東門以觀越寇之入滅吳也乃自刺殺吳王聞之大怒乃取子胥尸盛以鴟夷革浮之江中吳人憐之乃為立祠於江上因名曰胥山後十餘年越襲吳吳王還與戰不勝使大夫行成於越不許吳王將死曰吾以不用子胥之言以至於此令死者無知則已死者有知吾何面目以見子胥也遂蒙絮覆面而自刎齊簡公有臣曰諸御鞅諫簡公曰田常與宰豫之二人者甚相憎也臣恐其相攻相攻雖叛而危之不可願君去一人也簡公曰非而細人之所敢議也居無幾何田常果攻宰豫於庭賊簡公於朝簡公喟然太息曰余不用鞅之言以至此患也故忠臣之言不可不察也魯襄公朝荊至淮聞荊康王卒公欲還叔仲昭伯曰君之來也為其威也今其王死其威未去何為還大夫皆欲還子服景伯曰子之來也為國家之利也故不憚勤勞不遠道塗而聽於荊非義楚也畏其威也夫義人者固將慶其喜而弔其憂況畏而聘焉者乎畏而往聞喪而還其誰曰非侮也羋姓是嗣王太子又長矣執政未易事君任政求說其侮以定嗣君而示後人其讎滋大以戰小國其誰能止之若從君而致患不若違君以避難且君子計而後行二三子其計乎有御楚之術而有守國之備則可若未有也不如行乃遂行孝景皇帝時吳王濞反梁孝王中郎枚乘字叔聞之為書諫王其辭曰君王之外臣乘竊聞得全者全昌失全者全亡舜無立錐之地以有天下禹無十戶之聚以王諸侯湯武之地方不過百里上不絶三光之明下不傷百姓之心者有王術也故父子之道天性也忠臣不敢避誅以直諫故事無廢業而功流於萬世也臣誠願披腹心而效愚忠恐大王不能用之臣誠願大王少加意念惻怛之心於臣乘之言夫以一縷之任係千鈞之重上懸之無極之高下垂之不測之淵雖甚愚之人且猶知哀其將絶也馬方駭而重驚之係方絶而重鎮之係絶於天不可復結墜入深淵難以復出其出不出間不容髮誠能用臣乘之言一舉必脫必若所欲為危如重卵難於上天變所欲為易於反掌安於太山今欲極天命之壽弊無窮之樂保萬乘之勢不出反掌之易以居太山之安乃欲乘重卵之危走上天之難此愚臣之所大惑也人性有畏其影而惡其迹者卻背而走無益也不如就陰而止影滅迹絶欲人勿聞莫若勿言欲人勿知莫若勿為欲湯之冷令一人炊之百人揚之無益也不如絶薪止火而已不絶之於彼而救之於此譬猶抱薪救火也養由基楚之善射者也去楊葉百步百發百中楊葉之小而加百中焉可謂善射矣然其所止乃百步之中耳比於臣未知操弓持矢也福生有基禍生有胎納其基絶其胎禍何從來哉泰山之溜穿石引繩久之乃以栔木水非石之鑽繩非木之鋸也而漸靡使之然夫銖銖而稱之至石必差寸寸而度之至丈必過石稱丈量徑而寡失夫十圍之木始生於蘖可引而絶可擢而拔據其未生先其未形也磨礲砥礪不見其損有時而盡種樹畜長不見其益有時而大積德修行不知其善有時而用行惡為非棄義背理不知其惡有時而亡臣誠願大王熟計而身行之此百王不易之道也吳王不聽卒死丹徒吳王欲從民飲酒伍子胥諫曰不可昔白龍下清冷之淵化為魚漁者豫且射中其目白龍上訴天帝天帝曰當是之時若安置而形白龍對曰我下清冷之淵化為魚天帝曰魚固人之所射也若是豫且何罪夫白龍天帝貴畜也豫且宋國賤臣也白龍不化豫且不射今棄萬乘之位而從布衣之士飲酒臣恐其有豫且之患矣王乃止孔子曰良藥苦於口利於病忠言逆於耳利於行故武王諤諤而昌紂默默而亡君無諤諤之臣父無諤諤之子兄無諤諤之弟夫無諤諤之婦士無諤諤之友其亡可立而待也故曰君失之臣得之父失之子得之兄失之弟得之夫失之婦得之士失之友得之故無亡國破家悖父亂子放兄棄弟狂夫淫婦絶交敗友者也晏子復於景公曰朝居嚴乎公曰朝居嚴則曷害於治國家哉晏子對曰朝居嚴則下無言下無言則上無聞矣下無言則謂之喑上無聞則謂之聾聾喑則非害治國家如何也且合菽粟之微以滿倉廩合疏縷之緯以成幃幕太山之高非一石也纍卑然後高也夫治天下者非一士之言也固有受而不用惡有距而不入者哉
