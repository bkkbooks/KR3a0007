body:
  text: 善説孫卿曰夫談説之術齊莊以立之端誠以處之堅強以持之譬稱以諭之分別以明之歡欣憤滿以送之寶之珍之貴之神之如是則説常無不行矣夫是之謂能貴其所貴傳曰唯君子為能貴其所貴也詩云無易由言無曰苟矣鬼谷子曰人之不善而能矯之者難矣説之不行言之不從者其辨之不明也既明而不行者持之不固也既固而不行者未中其心之所善也辨之明之持之固之又中其人之所善其言神而珍白而分能入於人之心如此而説不行者天下未嘗聞也此之謂善説子貢曰出言陳辭身之得失國之安危也詩云辭之繹矣民之莫矣夫辭者人之所以自通也主父偃曰人而無辭安所用之昔子産修其辭而趙武致其敬王孫滿明其言而楚莊以慚蘇秦行其説而六國以安蒯通陳其説而身得以全夫辭者乃所以尊君重身安國全性者也故辭不可不修而説不可不善趙使人謂魏王曰為我殺范痤吾請獻七十里之地魏王曰諾使吏捕之圍而未殺痤自上屋騎危謂使者曰與其以死痤市不如以生痤市有如痤死趙不與王地則王將奈何故不若與先定割地然後殺痤魏王曰善痤因上書信陵君曰痤故魏之免相也趙以地殺痤而魏王聽之有如強秦亦將襲趙之欲則君且奈何信陵君言於王而出之吳人入荊召陳懷公懷公召國人曰欲與荊者左欲與吳者右逢滑當公而進曰吳未有福荊未有禍公曰國勝君出非禍而奚對曰小國有是猶復而況大國乎楚雖無德亦不斬艾其民吳日弊於兵暴骨如莽未見德焉天其或者正訓荊也禍之適吳何日之有陳侯從之桓公立仲父致大夫曰善吾者入門而右不善吾者入門而左有中門而立者桓公問焉對曰管子之知可與謀天下其強可與取天下君恃其信乎內政委焉外事斷焉驅民而歸之是亦可奪也桓公曰善乃謂管仲政則卒歸於子矣政之所不及唯子是匡管仲故築三歸之臺以自傷於民齊宣王出獵於社山社山父老十三人相與勞王王曰父老苦矣謂左右賜父老田不租父老皆拜閭丘先生獨不拜王曰父老以為少耶謂左右復賜父老無徭役父老皆拜閭丘先生又不拜王曰拜者去不拜者前曰寡人今日來觀父老幸而勞之故賜父老田不租父老皆拜先生獨不拜寡人自以為少故賜父老無徭役父老皆拜先生又獨不拜寡人得無有過乎閭丘先生對曰惟聞大王來遊所以為勞大王望得壽於大王望得富於大王望得貴於大王王曰天殺生有時非寡人所得與也無以壽先生倉廩雖實以備災害無以富先生大官無缺小官卑賤無以貴先生閭丘先生對曰此非人臣所敢望也願大王選良富家子有修行者以為吏平其法度如此臣可少得以壽焉春秋冬夏振之以時無煩擾百姓如是臣可少得以富焉願大王出令令少者敬長長者敬老如是臣可少得以貴焉今大王幸賜臣田不租然則倉廩將虛也賜臣無徭役然則官府無使焉此固非人臣之所敢望也齊王曰善願請先生為相孝武皇帝時汾陰得寶鼎而獻之於甘泉宮群臣賀上壽曰陛下得周鼎侍中虞丘壽王獨曰非周鼎上聞之召而問曰今朕得周鼎群臣皆以為周鼎而壽王獨以為非何也壽王有説則生無説則死對曰臣壽王安敢無説臣聞夫周德始産于后稷長於公劉大於大王成於文武顯於周公德澤上洞天下漏泉無所不通上天報應鼎為周出故名曰周鼎今漢自高祖繼周亦昭德顯行布恩施惠六合和同至於陛下之身功德逾盛天瑞並至徵祥畢見昔秦始皇帝親出鼎於彭城而不能得天昭有德而寶鼎自至此天之所以豫漢乃漢鼎非周鼎也上曰善群臣皆稱萬歲是日賜虞丘壽王黃金十斤晉獻公之時東郭民有祖朝者上書獻公曰草茅臣東郭民祖朝願請聞國家之計獻公使使出告之曰肉食者已慮之矣藿食者尚何與焉祖朝對曰大王獨不聞古之將曰桓司馬者朝朝其君舉而晏御呼車驂亦呼車御肘其驂曰子何越云為乎何為藉呼車驂謂其御曰當呼者呼乃吾事也子當御正子之轡銜耳子今不正轡銜使馬卒然驚妄轢道中行人必逢大敵下車免劍涉血履肝者固吾事也子寧能辟子之轡下佐我乎其禍亦及吾身與有深憂吾安得無呼車乎今大王曰食肉者已慮之矣藿食者尚何與焉設使食肉者一旦失計於廟堂之上若臣等之藿食者寧得無肝膽塗地於中原之野與其禍亦及臣之身臣與有其憂深臣安得無與國家之計乎獻公召而見之三日與語無復憂者乃立以為師也客謂梁王曰惠子之言事也善譬王使無譬則不能言矣王曰諾明日見謂惠子曰願先生言事則直言耳無譬也惠子曰今有人於此而不知彈者曰彈之狀何若應曰彈之狀如彈則諭乎王曰未諭也於是更應曰彈之狀如弓而以竹為弦則知乎王曰可知矣惠子曰夫説者固以其所知諭其所不知而使人知之今王曰無譬則不可矣王曰善孟嘗君寄客於齊王三年而不見用故客反謂孟嘗君曰君之寄臣也三年而不見用不知臣之罪也君之過也孟嘗君曰寡人聞之縷因針而入不因針而急嫁女因媒而成不因媒而親夫子之材必薄矣尚何怨乎寡人哉客曰不然臣聞周氏之嚳韓氏之盧天下疾狗也見菟而指屬則無失菟矣望見而放狗也則纍世不能得菟矣狗非不能屬之者罪也孟嘗君曰不然昔華舟杞梁戰而死其妻悲之向城而哭隅為之崩城為之陀君子誠能刑於內則物應於外矣夫土壤且可為忠況有食穀之君乎客曰不然臣見鷦鷯巢於葦苕著之髮毛臨危建之女工不能為也可謂完堅矣大風至則苕折卵破子死者何也其所託者使然也且夫狐者人之所攻也鼠者人之所燻也臣未嘗見稷狐見攻社鼠見燻也何則所託者然也於是孟嘗君復屬之齊齊王使為相陳子説梁王梁王説而疑之曰子何為去陳侯之國而教小國之孤於此乎陳子曰夫善亦有道而遇亦有時昔傅説衣褐帶索而築於秕傳之城武丁夕夢旦得之時王也寧戚飯牛康衢擊車輻而歌顧見桓公得之時霸也百里奚自賣五羊之皮為秦人虜穆公得之時強也論若三子之行未得為孔子駿徒也今孔子經營天下南有陳蔡之厄而北干景公二坐而五立未嘗離也孔子之時不行而景公之時怠也以孔子之聖不能以時行説之怠亦獨能如之何乎林既衣韋衣而朝齊景公齊景公曰此君子之服也小人之服也林既逡巡而作色曰夫服事何足以端士行乎昔者荊為長劍危冠令尹子西出焉齊短衣而遂偞之冠管仲隰朋出焉越文身剪髮范蠡大夫種出焉西戎左衽而椎結由余亦出焉即如君言衣狗裘者當犬吠衣羊裘者當羊鳴且君衣狐裘而朝意者得無為變乎景公曰子真為勇悍矣今未嘗見子之奇辨也一鄰之鬭也千乘之勝也林既曰不知君之所謂者何也夫登高臨危而目不眴而足不陵者此工匠之勇悍也入深淵刺蛟龍抱黿鼉而出者此漁夫之勇悍也入深山刺虎豹抱熊羆而出者此獵夫之勇悍也夫不難斷頭裂腹暴骨流血中野者此武士之勇悍也今臣居廣廷作色端辨以犯主君之怒前雖有乘軒之賞未為之動也後雖有斧質之威未為之恐也此既之所以為勇悍也魏文侯與大夫飲酒使公乘不仁為觴政曰飲不釂者浮以大白文侯飲而不釂公乘不仁舉大白浮君君視而不應侍者曰不仁退君已醉矣公乘不仁曰周書曰前車覆後車戒蓋言其危為人臣者不易為君亦不易今君已設令令不行可乎君曰善舉白而飲之飲畢曰以公乘不仁為上客襄成君始封之日衣翠衣帶玉彘佩玉劍履縞舄立於流水之上大夫擁鍾錘縣令執桴號令呼誰能渡王者於是也楚大夫莊辛過而説之遂造託而拜謁起立曰臣願把君之手其可乎襄成君忿然作色而不言莊辛遷延沓手而稱曰君獨不聞夫鄂君子晳之泛舟於新波之中也乘青翰之舟極㒼芘張翠蓋而㩉犀尾班麗袿衽會鍾鼓之音畢榜枻越人擁楫而歌歌辭曰濫兮抃草濫豫昌枑澤豫昌州州𩜱州焉乎秦胥胥縵豫乎昭澶秦踰滲惿隨河湖鄂君子晳曰吾不知越歌子試為我楚説之於是乃召越譯乃楚説之曰今夕何夕兮搴中洲流今日何日兮得與王子同舟蒙羞被好兮不訾詬恥心幾頑而不絶兮知得王子山有木兮木有枝心説君兮君不知於是鄂君子晳乃㩉修袂行而擁之舉繡被而覆之鄂君子晳親楚王母弟也官為令尹爵為執圭一榜枻越人猶得交歡盡意焉今君何以踰於鄂君子晳臣何以獨不若榜枻之人願把君之手其不可何也襄成君乃奉手而進之曰吾少之時亦嘗以色稱於長者矣未嘗遇僇如此之卒也自今以後願以壯少之禮謹受命雍門子周以琴見乎孟嘗君孟嘗君曰先生鼓琴亦能令文悲乎雍門子周曰臣何獨能令足下悲哉臣之所能令悲者有先貴而後賤先富而後貧者也不若身材高妙適遭暴亂無道之主妄加不道之理焉不若處勢隱絶不及四鄰詘折儐厭襲於窮巷無所告訴不若交歡相愛無怨而生離遠赴絶國無復相見之時不若少失二親兄弟別離家室不足憂戚盈胸當是之時也固不可以聞飛鳥疾風之聲窮窮焉固無樂已凡若是者臣一為之徽膠援琴而長太息則流涕沾襟矣今若足下千乘之君也居則廣廈邃房下羅帷來清風倡優侏儒處前迭進而諂諛燕則鬭象棋而舞鄭女揚激楚之切風練色以淫目流聲以虞耳水遊則連方舟載羽旗鼓吹乎不測之淵野遊則馳聘弋獵乎平原廣囿格猛獸入則撞鍾擊鼓乎深宮之中方此之時視天地曾不若一指忘死與生雖有善鼓琴者固未能令足下悲也孟嘗君曰否否文固以為不然雍門子周曰然臣之所為足下悲者一事也夫聲敵帝而困秦者君也連五國之約南面而伐楚者又君也天下未嘗無事不從則橫從成則楚王橫成則秦帝楚王秦帝必報讎於薛矣夫以秦楚之強而報讎於弱薛譬之猶摩蕭斧而伐朝菌也必不留行矣天下有識之士無不為足下寒心酸鼻者千秋萬歲之後廟堂必不血食矣高臺既以壞曲池既以漸墳墓既以平而青廷矣嬰兒豎子樵採薪蕘者蹢躅其足而歌其上衆人見之無不愀焉為足下悲之曰夫以孟嘗君之尊貴乃可使若此乎於是孟嘗君泫然泣涕承睫而未殞雍門子周引琴而鼓之徐動宮徵微揮羽角切終而成曲孟嘗君涕浪汗增欷而就之曰聞先生之鼓琴令文立若破國亡邑之人也蘧伯玉使至楚逢公子晳濮水之上子晳捽草而待曰敢問上客將何之蘧伯玉為之軾車公子晳曰吾聞上士可以託色中士可以託辭下士可以託財三者固可得而託身耶蘧伯玉曰謹受命蘧伯玉見楚王使事畢坐談語從容言至於士楚王曰何國最多士蘧伯玉曰楚最多士楚王大悅蘧伯玉曰楚最多士而楚不能用王造然曰是何言也蘧伯玉曰伍子胥生於楚逃之吳吳受而相之發兵攻楚墮平王之墓伍子胥生於楚而吳善用之釁蚠黃生於楚走之晉治七十二縣道不拾遺民不妄得城郭不閉國無盜賊蚠黃生於楚而晉善用之今者臣之來逢公子晳濮水之上辭言上士可以託色中士可以託辭下士可以託財三者固可得而託身耶又不知公子晳將何治也於是楚王發使一駟副使二乘追公子晳濮水之上子晳還重於楚蘧伯玉之力也故詩曰誰能烹魚溉之釜鬵孰將西歸懷之好音此之謂也物之相得固微甚矣叔向之弟羊舌虎善樂達達有罪於晉晉誅羊舌虎叔向為之奴既而祁奚曰吾聞小人得位不爭不義君子所憂不救不祥乃往見范宣子而説之曰聞善為國者賞不過而刑不濫賞過則懼及淫人刑濫則懼及君子與其不幸而過寧過而賞淫人無過而刑君子故堯之刑也殛鯀於羽山而用禹周之刑也僇管蔡而相周公不濫刑也宣子乃命吏出叔向救人之患者行危苦而不避煩辱猶不能免今祁奚論先王之德而叔向得免焉學豈可已哉張祿掌門見孟嘗君曰衣新而不舊倉庾盈而不虛為之有道君亦知之乎孟嘗君曰衣新而不舊則是修也倉庾盈而不虛則是富也為之奈何其説可得聞乎張祿曰願君貴則舉賢富則振貧若是則衣新而不舊倉庾盈而不虛矣孟嘗君以其言為然説其意辨其辭明日使人奉黃金百斤文織百純進之張先生先生辭而不受後先生復見孟嘗君孟嘗君曰前先生幸教文曰衣新而不舊倉庾盈而不虛為之有説汝亦知之乎文竊説教故使人奉黃金百斤文織百純進之先生以補門內之不贍者先生曷為辭而不受乎張祿曰君將掘君之偶錢發君之庾粟以補士則衣弊履穿而不贍耳何暇衣新而不舊倉庾盈而不虛乎孟嘗君曰然則為之奈何張祿曰夫秦者四塞國也遊宧者不得入焉願君為吾為咫尺之書寄我與秦王我往而遇乎固君之入也往而不遇乎雖人求間謀固不遇臣矣孟嘗君曰敬聞命矣因為之書寄之秦王往而大遇謂秦王曰自祿之來入大王之境田疇益辟吏民益治然而大王有一不得者大王知之乎王曰不知曰夫山東有相所謂孟嘗君者其人賢人天下無急則已有急則能收天下英乂雄俊之士與之合交連友者疑獨此耳然則大王胡不為我友之乎秦王曰敬受命奉千金以遺孟嘗君孟嘗君輟食察之而寤曰此張生之所謂衣新而不舊倉庾盈而不虛者也莊周貧者往貸粟於魏文侯文侯曰待吾邑粟之來也而獻之周曰乃今者周之來見道傍牛蹄中有鮒魚焉大息謂周曰我尚可活也周曰須我為汝南見楚王決江淮以溉汝鮒魚曰今吾命在盆甕之中耳乃為我見楚王決江淮以溉我汝即求我於枯魚之肆矣今周以貧故來貸粟而曰須我邑粟來也而賜臣即來亦求臣傭肆矣文侯於是乃發粟百鍾送之莊周之室晉平公問叔向曰歲飢民疫翟人攻我我將若何對曰歲飢來年而反矣疾疫將止矣翟人不足患也公曰患有大於此者乎對曰夫大臣重祿而不極諫近臣畏罪而不敢言左右顧寵於小官而君不知此誠患之大者也公曰善於是令國中曰欲有諫者為隱左右言及國吏罪趙簡子攻陶有二人先登死於城上簡子欲得之陶君不與承盆疽謂陶君曰簡子將掘君之墓以與君之百姓市曰踰邑梯城者將赦之不者將掘其墓朽者揚其灰未朽者辜其尸陶君懼請效二人之尸以為和子貢見太宰嚭太宰嚭問曰孔子何如對曰臣不足以知之太宰嚭曰子不知何以事之對曰惟不知故事之夫子其猶大山林也百姓各足其材焉太宰嚭曰子增夫子乎對曰夫子不可增也夫賜其猶一纍壤也以一纍壤增大山不益其高且為不知太宰嚭曰然則子有所酌也對曰天下有大樽而子獨不酌焉不識誰之罪也趙簡子問子貢曰孔子為人何如子貢對曰賜不能識也簡子不説曰夫子事孔子數十年終業而去之寡人問子子曰不能識何也子貢曰賜譬渴者之飲江海知足而已孔子猶江海也賜則奚足以識之簡子曰善哉子貢之言也齊景公謂子貢曰子誰師曰臣師仲尼公曰仲尼賢乎對曰賢公曰其賢何若對曰不知也公曰子知其賢而不知其奚若可乎對曰今謂天高無少長愚智皆知高高幾何皆曰不知也是以知仲尼之賢而不知其奚若趙襄子謂仲尼曰先生委質以見人主七十君矣而無所通不識世無明君乎意先生之道固不通乎仲尼不對異日襄子見子路曰吾嘗問先生以道先生不對知而不對則隱也隱則安得為仁若信不知安得為聖子路曰建天下之鳴鍾而撞之以挺豈能發其聲乎哉君問先生無乃猶以挺撞乎衛將軍文子問子貢曰季文子三窮而三通何也子貢曰其窮事賢其通舉窮其富分貧其貴禮賤窮而事賢則不侮通而舉窮則忠於朋友富而分貧則宗族親之貴而禮賤則百姓戴之其得之固道也失之命也曰失而不得者何也曰其窮不事賢其通不舉窮其富不分貧其貴不理賤其得之命也其失之固道也子路問於孔子曰管仲何如人也子曰大人也子路曰昔者管子説襄公襄公不説是不辨也欲立公子糾而不能是無能也家殘於齊而無憂色是不慈也桎梏而居檻車中無慚色是無愧也事所射之君是不貞也召忽死之管仲不死是無仁也夫子何以大之子曰管仲説襄公襄公不説管子非不辨也襄公不知説也欲立公子糾而不能非無能也不遇時也家殘於齊而無憂色非不慈也知命也桎梏居檻車而無慚色非無愧也自裁也事所射之君非不貞也知權也召忽死之管仲不死非無仁也量輕重也召忽者人臣之材也不死則三軍之虜也死之則名聞天下夫何為不死哉管子者天子之佐諸侯之相也死之則不免為溝中之瘠不死則功復用於天下夫何為死之哉由汝不知也晉平公問於師曠曰咎犯與趙衰孰賢對曰陽處父欲臣文公因咎犯三年不達因趙衰三日而達智不知其士衆不智也知而不言不忠也欲言之而不敢無勇也言之而不聽不賢也趙簡子問於成摶曰吾聞夫羊殖者賢大夫也是行奚然對曰臣摶不知也簡子曰吾聞之子與友親子而不知何也摶曰其為人也數變其十五年也廉以不匿其過其二十也仁以喜義其三十也為晉中軍尉勇以喜仁其年五十也為邊城將遠者復親今臣不見五年矣恐其變是以不敢知簡子曰果賢大夫也每變益上矣
