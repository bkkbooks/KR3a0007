body:
  text: 臣術人臣之術順從而復命無所敢專義不苟合位不苟尊必有益於國必有補於君故其身尊而子孫保之故人臣之行有六正六邪行六正則榮犯六邪則辱夫榮辱者禍福之門也何謂六正六邪六正者一曰萌芽未動形兆未見昭然獨見存亡之幾得失之要預禁乎未然之前使主超然立乎顯榮之處天下稱孝焉如此者聖臣也二曰虛心白意進善通道勉主以禮義諭主以長策將順其美匡救其惡功成事立歸善於君不敢獨伐其勞如此者良臣也三曰卑身賤體夙興夜寐進賢不解數稱於往古之行事以厲主意庶幾有益以安國家社稷宗廟如此者忠臣也四曰明察幽見成敗早防而救之引而復之塞其間絶其源轉禍以為福使君終以無憂如此者智臣也五曰守文奉法任官職事辭祿讓賜不受贈遺衣服端齊飲食節儉如此者貞臣也六曰國家昏亂所為不諫然而敢犯主之嚴顏面言主之過失不辭其誅身死國安不悔所行如此者直臣也是為六正也六邪者一曰安官貪祿營於私家不務公事懷其智藏其能主飢於論渴於策猶不肯盡節容容乎與世沉浮上下左右觀望如此者具臣也二曰主所言皆曰善主所為皆曰可隱而求主之所好即進之以快主之耳目偷合苟容與主為樂不顧其後害如此者諛臣也三曰中實頗險外貌小謹巧言令色又心嫉賢所欲進則明其美而隱其惡所欲退則明其過而匿其美使主妄行過任賞罰不當號令不行如此者姦臣也四曰智足以飾非辨足以行說反言易辭而成文章內離骨肉之親外妬亂朝廷如此者讒臣也五曰專權擅勢持抔國事以為輕重私門成黨以富其家又復增加威勢擅矯主命以自貴顯如此者賊臣也六曰諂主以邪墜主於不義朋黨比周以蔽主明入則辨言好辭出則更復異其言語使白黑無別是非無間伺候可推因而附然使主惡布於境內聞於四鄰如此者亡國之臣也是謂六邪賢臣處六正之道不行六邪之術故上安而下治生則見樂死則見思此人臣之術也湯問伊尹曰三公九卿大夫列士其相去何如伊尹對曰三公者知通於大道應變而不窮辨於萬物之情通於天道者也其言足以調陰陽正四時節風雨如是者舉以為三公故三公之事常在於道也九卿者不失四時通溝渠修堤防種樹木美五穀通於地里者也能通不能通能利不能利如此者舉以為九卿故九卿之事常在於德也大夫者出入與民同衆取去與民同利通於人事行猶舉繩不傷於言言之於世不害於身通於關梁實於府庫如是者舉以為大夫故大夫之事常在於仁也列士者知義而不失其心事功而不獨專其賞忠正彊諫而無有姦詐去私立公而言有法度如是者舉以為列士故列士之事常在於義也故道德仁義定而天下正凡此四者明王臣而不臣湯曰何謂臣而不臣伊尹對曰君之所不名臣者四諸父臣而不名諸兄臣而不名先王之臣臣而不名盛德之士臣而不名是謂大順也湯問伊尹曰古者所以立三公九卿大夫列士者何也伊尹對曰三公者所以參五事也九卿者所以參三公也大夫者所以參九卿也列士者所以參大夫也故參而有參是謂事宗事宗不失外內若一子貢問於孔子曰今之人臣孰為賢孔子曰吾未識也往者齊有鮑叔鄭有子皮賢者也子貢曰然則齊無管仲鄭無子産者乎子曰賜汝徒知其一不知其二汝聞進賢為賢耶用力為賢耶子貢曰進賢為賢子曰然吾聞鮑叔之進管仲也聞子皮之進子産也未聞管仲子産之有所進也魏文侯且置相召李克而問焉曰寡人將置相置於季成子與翟觸我孰置而可李克曰臣聞之賤不謀貴外不謀內踈不謀親臣者踈賤不敢聞命文侯曰此國事也願與先生臨事而勿辭李克曰君不察故也可知矣貴視其所舉富視其所與貧視其所不取窮視其所不為由此觀之可知矣文侯曰先生出矣寡人之相定矣李克出遇翟黃翟黃問曰吾聞君問相於先生未知果孰為之李克曰季成子為之翟黃作色不悅曰觸失望於先生李克曰子何遽失望於我子之言我於子之君也豈與我比周而求大官哉君問相於我臣對曰君不察故也貴視其所舉富視其所與貧視其所不取窮視其所不為由此觀之可知也君曰出矣寡人之相定矣以是知季成子之為相翟黃不悅曰觸何遽不為相乎西河之守觸所任也計事內史觸所任也王欲攻中山吾進樂羊無使治之臣吾進先生無使傅其子吾進屈侯鮒觸何負於季成子李克曰子不如季成子季成子食采千鍾什九居外一居中以聘約天下之士是以東得卜子夏田子方段干木彼其所舉人主之師也子之所舉人臣之才也翟黃迮然而慚曰觸失對於先生請自修然後學言未卒而左右言季成子立為相矣於是翟黃默然變色內慚不敢出三月也楚令尹死景公遇成公乾曰令尹將焉歸成公乾曰殆於屈春乎景公怒曰國人以為歸於我成公乾曰子資少屈春資多于義獲天下之至憂也而子以為友鳴鶴與芻狗其知甚少而子玩之鴟夷子皮日侍於屈春損頗為友二人者之智足以為令尹不敢專其智而委之屈春故曰政其歸於屈春乎田子方渡西河造翟黃翟黃乘軒車戴華蓋黃金之勒約鎮簟席如此者其駟八十乘子方望之疑以為人君也道狹下抵車而待之翟黃至而睹其子方也下車而趨自投下風曰觸田子方曰子與吾嚮者望子疑以為人君也子至而人臣也將何以至此乎翟黃對曰此皆君之所以賜臣也積三十歲故至於此時以間暇祖之曠野正逢先生子方曰何子賜車輿之厚也翟黃對曰昔者西河無守臣進吳起而西河之外寧鄴無令臣進西門豹而魏無趙患酸棗無令臣進北門可而魏無齊憂魏欲攻中山臣進樂羊而中山拔魏無使治之臣臣進李克而魏國大治是以進此五大夫者爵祿倍以故至於此子方曰可子勉之矣魏國之相不去子而之他矣翟黃對曰君母弟有公孫季成者進子夏而君師之進段干木而君友之進先生而君敬之彼其所進師也友也所敬者也臣之所進者皆守職守祿之臣也何以至魏國相乎子方曰吾聞身賢者賢也能進賢者亦賢也子之五舉者盡賢子勉之矣子終其次矣齊威王遊於瑤臺成侯卿來奏事從車羅騎甚衆王望之謂左右曰來者何為者也左右曰成侯卿也王曰國至貧也何出之盛也左右曰與人者有以責之也受人者有以易之也王試問其說成侯卿至上謁曰忌也王不應又曰忌也王不應又曰忌也王曰國至貧也何出之盛也成侯卿曰赦其死罪使臣得言其說王曰諾對曰忌舉田居子為西河而秦梁弱忌舉田解子為南城而楚人抱羅綺而朝忌舉黔涿子為冥州而燕人給牲趙人給盛忌舉田種首子為即墨而於齊足究忌舉北郭刁勃子為大士而九族益親民益富舉此數良人者王枕而臥耳何患國之貧哉秦穆公使賈人載鹽於衛徵諸賈人賈人買百里奚以五羖羊之皮使將車之秦秦穆公觀鹽見百里奚牛肥曰任重道遠以險而牛何以肥也對曰臣飲食以時使之不以暴有險先後之以身是以肥也穆公知其君子也令有司具沐浴為衣冠與坐公大悅異日與公孫支論政公孫支大不寧曰君耳目聰明思慮審察君其得聖人乎公曰然吾悅夫奚之言彼類聖人也公孫支遂歸取鴈以賀曰君得社稷之臣敢賀社稷之福公不辭再拜而受明日公孫支乃致上卿以讓百里奚曰秦國處僻民陋以愚無知危亡之本也臣自知不足以處其上請以讓之公不許公孫支曰君不用賓相而得社稷之聖臣君之祿也臣見賢而讓之臣之祿也今君既得其祿矣而使臣失祿可乎請終致之公不許公孫支曰臣不肖而處上位是君失倫也不肖失倫臣之過進賢而退不肖君之明也今臣處位廢君之德而逆臣之行也臣將逃公乃受之故百里奚為上卿以制之公孫支為次卿以佐之也趙簡主從晉陽之邯鄲中路而止引車吏進問君何為止簡主曰董安于在後吏曰此三軍之事也君奈何以一人留三軍也簡主曰諾驅之百步又止吏將進諫董安于適至簡主曰秦道之與晉國交者吾忘令人塞之董安于曰此安于之所為後也簡主曰官之寶璧吾忘令人載之對曰此安于之所為後也簡主曰行人燭過年長矣言未嘗不為晉國法也吾行忘令人辭且聘焉對曰此安于之所為後也簡主可謂內省外知人矣哉故身佚國安御史大夫周昌曰人主誠能如趙簡主朝不危矣晏子侍於景公朝寒公曰請進熱食對曰嬰非君之廚養臣也敢辭公曰請進服裘對曰嬰非君田澤之臣也敢辭公曰然夫子於寡人奚為者也對曰社稷之臣也公曰何謂社稷之臣對曰社稷之臣能立社稷辨上下之宜使得其理制百官之序使得其宜作為辭令可分布於四方自是之後君不以禮不見晏子也齊侯問於晏子曰忠臣之事其君也何若對曰有難不死出亡不送君曰裂地而封之疏爵而貴之君有難不死出亡不送可謂忠乎對曰言而見用終身無難臣何死焉諫而見從終身不亡臣何送焉若言不見用有難而死之是妄死也諫而不見從出亡而送之是詐為也故忠臣也者能納善於君而不能與君陷難者也晏子朝乘弊車駕駑馬景公見之曰嘻夫子之祿寡耶何乘不佼之甚也晏子對曰賴君之賜得以壽三族及國交遊皆得生焉臣得暖衣飽食弊車駑馬以奉其身於臣足矣晏子出公使梁丘據遺之輅車乘馬三返不受公不悅趣召晏子晏子至公曰夫子不受寡人亦不乘晏子對曰君使臣臨百官之吏臣節其衣服飲食之養以先齊國之人然猶恐其侈靡而不顧其行也今輅車乘馬君乘之上而臣亦乘之下民之無義侈其衣食而不顧其行者臣無以禁之遂讓不受也景公飲酒陳桓子侍望見晏子而復於公曰請浮晏子公曰何故也對曰晏子衣緇布之衣麋鹿之裘棧軫之車而駕駑馬以朝是隱君之賜也公曰諾酌者奉觴而進之曰君命浮子晏子曰何故也陳桓子曰君賜之卿位以尊其身寵之百萬以富其家群臣之爵莫尊於子祿莫厚於子今子衣緇布之衣麋鹿之裘棧軫之車而駕駑馬以朝則是隱君之賜也故浮子晏子避席曰請飲而後辭乎其辭而後飲乎公曰辭然後飲晏子曰君賜之卿位以顯其身嬰不敢為顯受也為行君令也寵之百萬以富其家嬰不敢為富受也為通君賜也臣聞古之賢君臣有受厚賜而不顧其國族則過之臨事守職不勝其任則過之君之內隸臣之父兄若有離散在於野鄙者此臣之罪也君之外隸臣之所職若有播亡在於四方者此臣之罪也兵革不完戰車不修此臣之罪也若夫弊車駑馬以朝意者非臣之罪也且臣以君之賜臣父之黨無不乘車者母之黨無不足於衣食者妻之黨無凍餒者國之簡士待臣而後舉火者數百家如此為隱君之賜乎彰君之賜乎公曰善為我浮無宇也晏子方食君之使者至分食而食之使者不飽晏子亦不飽使者返言之景公景公曰嘻夫子之家若是其貧也寡人不知也是寡人之過也令吏致千家之縣一於晏子晏子再拜而辭曰嬰之家不貧以君之賜澤覆三族延及交遊以振百姓君之賜也厚矣嬰之家不貧也嬰聞之厚取之君而厚施之人代君為君也忠臣不為也厚取之君而藏之是筐篋存也仁人不為也厚取之君而無所施之身死而財遷智者不為也嬰也聞為人臣進不事上以為忠退不克下以為廉八升之布一豆之食足矣使者三返遂辭不受也陳成子謂鴟夷子皮曰何與常也對曰君死吾不死君亡吾不亡陳成子曰然子何以為常對曰未死去死未亡去亡其有何死亡矣從命利君為之順從命病君謂之諛逆命利君謂之忠逆命病君謂之亂君有過不諫諍將危國家殞社稷也有能盡言於君用則留不用則去謂之諫用則可生不用則死謂之諍有能比知同力率群下相與彊矯君君雖不安不能不聽遂解國之大患除國之大害成於尊君安國謂之輔有能亢君之命反君之事竊君之重以安國之危除主之辱攻伐足以成國之大利謂之弼故諫諍輔弼之人社稷之臣也明君之所尊禮而暗君以為己賊故明君之所賞暗君之所殺也明君好問暗君好獨明君上賢使能而享其功暗君畏賢妬能而滅其業罰其忠而賞其賊夫是之謂至暗桀紂之所以亡也詩云曾是莫聽大命以傾此之謂也簡子有臣尹綽赦厥簡子曰厥愛我諫我必不於衆人中綽也不愛我諫我必於衆人中尹綽曰厥也愛君之醜而不愛君之過臣也愛君之過而不愛君之醜孔子曰君子哉尹綽面訾不面譽也高繚仕於晏子三年無故晏子逐之左右諫曰高繚之事夫子三年曾無以爵位而逐之其義可乎晏子曰嬰仄陋之人也四維之然後能直今此子事吾三年未嘗弼吾過是以逐之也子貢問孔子曰賜為人下而未知所以為人下之道也孔子曰為人下者其猶土乎種之則五穀生焉掘之則甘泉出焉草木植焉禽獸育焉生人立焉死人入焉多其功而不言為人下者其猶土乎孫卿曰少事長賤事貴不肖事賢此天下之通義也有人貴而不能為人上賤而羞為人下此姦人之心也身不離姦心而行不離姦道然而求見譽於衆不亦難乎公叔文子問於史叟曰武子勝事趙簡子久矣其寵不解奚也史叟曰武子勝博聞多能而位賤君親而近之致敏以遜藐而疏之則恭而無怨色入與謀國家出不見其寵君賜之祿知足而辭故能久也泰誓曰附下而罔上者死附上而罔下者刑與聞國政而無益於民者退在上位而不能進賢者逐此所以勸善而黜惡也故傳曰傷善者國之殘也蔽善者國之讒也訴無罪者國之賊也王制曰假於鬼神時日卜筮以疑於衆者殺也子路為蒲令備水災與民春修溝瀆為人煩苦故人與之一簞食一壺漿孔子聞之使子貢復之子路忿然不悅往見夫子曰由也以暴雨將至恐有水災故與人修溝瀆以備之而民多匱於食故與人一簞食一壺漿而夫子使賜止之何也夫子止由之行仁也夫子以仁教而禁其行仁也由也不受孔子曰爾以民為餓何不告於君發倉廩以給食之而以爾私饋之是汝不明君之惠見汝之德義也速已則可矣否則爾之受罪不久矣子路心服而退也
