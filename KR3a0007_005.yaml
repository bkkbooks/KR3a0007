body:
  text: 貴德聖人之於天下百姓也其猶赤子乎飢者則食之寒者則衣之將之養之育之長之唯恐其不至於大也詩曰蔽芾甘棠勿翦勿伐召伯所茇傳曰自陝以東者周公主之自陝以西者召公主之召公述職當桑蠶之時不欲變民事故不入邑中舍于甘棠之下而聽斷焉陝間之人皆得其所是故後世思而歌詠之善之故言之言之不足故嗟歎之嗟歎之不足故詠歌之夫詩人感然後思思然後積積然後滿滿然後發發由其道而致其位焉百姓歎其美而致其敬甘棠之不伐也政教惡乎不行孔子曰吾於甘棠見宗廟之敬也甚矣思其人必愛其樹尊其人必敬其位順安萬物古聖之道幾哉仁人之德教也誠惻隱於中悃愊於內不能已於其心故其治天下也如救溺人見天下強凌弱衆暴寡幼孤裸露死傷係虜不忍其然是以孔子歷七十二君冀道之一行而得施其德使民生於全育蒸庶安土萬物熙熙各樂其終卒不遇故睹麟而泣哀道不行德澤不洽於是退作春秋明素王之道以示後人思施其惠未嘗輟忘是以百王尊之志士法焉誦其文章傳今不絶德及之也詩曰載馳載驅周爰咨謀此之謂也聖王布德施惠非求報於百姓也郊望禘嘗非求報於鬼神也山致其高而雲雨起焉水致其深而蛟龍生焉君子致其道而福祿歸焉夫有陰德者必有陽報有隱行者必有昭名古者溝防不修水為人害禹鑿龍門闢伊闕平治水土使民得陸處百姓不親五品不遜契教以君臣之義父子之親夫婦之辨長幼之序田野不修民食不足后稷教之闢地墾草糞土樹穀令百姓家給人足故三后之後無不王者有陰德也周室衰禮義廢孔子以三代之道教導於後世繼嗣至今不絶者有隱行也周頌曰豐年多黍多稌亦有高廩萬億及秭為酒為醴蒸畀祖妣以洽百禮降福孔偕禮記曰上牲損則用下牲下牲損則祭不備物以其舛之為不樂也故聖人之於天下也譬猶一堂之上也今有滿堂飲酒者有一人獨索然向隅而泣則一堂之人皆為之不樂矣聖人之於天下也譬猶一堂之上也有一人不得其所者則孝子不敢以其物薦進也魏武侯浮西河而下中流顧謂吳起曰美哉乎河山之固也此魏國之寶也吳起對曰在德不在險昔三苗氏左洞庭而右彭蠡德義不修而禹滅之夏桀之居左河濟而右太華伊闕在其南羊腸在其北修政不仁而湯放之殷紂之國左孟門而右太行常山在其北大河經其南修政不德而武王伐之由此觀之在德不在險若君不修德船中之人盡敵國也武侯曰善武王克殷召太公而問曰將奈其士衆何太公對曰臣聞愛其人者兼其屋上之烏憎其人者惡其胥餘咸劉厥敵使靡有餘何如王曰不可太公出邵公入王曰為之奈何邵公對曰有罪者殺之無罪者活之何如王曰不可邵公出周公入王曰為之奈何周公曰使各居其宅田其田無變舊新唯仁是親百姓有過在豫一人武王曰廣大乎平天下矣凡所以貴士君子者以其仁而有德也孔子曰里仁為美擇不處仁焉得智夫仁者必恕然後行行一不義殺一無罪雖以得高官大位仁者不為也夫大仁者愛近以及遠及其有所不諧則虧小仁以就大仁大仁者恩及四海小仁者止於妻子妻子者以其知營利以婦人之恩撫之飾其內情雕畫其偽孰知其非真雖當時蒙榮然士君子以為大辱故共工歡兜符里鄧析其智非無所識也然而為聖王所誅者以無德而苟利也豎刁易牙毀體殺子以干利卒為賊於齊故人臣不仁篡弒之亂生人臣而仁國治主榮明主察焉宗廟大寧夫人臣猶貴仁況於人主乎故桀紂以不仁失天下湯武以積德有海土是以聖王貴德而務行之孟子曰推恩足以及四海不推恩不足以保妻子古人所以大過人者無他焉善推其所有而已晏子飲景公酒令器必新家老曰財不足請斂於民晏子曰止夫樂者上下同之故天子與天下諸侯與境內自大夫以下各與其僚無有獨樂今上樂其樂下傷其費是獨樂者也不可齊桓公北伐山戎氏其道過燕燕君逆而出境桓公問管仲曰禮諸侯相逆固出境乎管仲曰非天子不出境桓公曰然則燕君畏而失禮也寡人不道而使燕君失禮乃割燕君所至之地以與燕君諸侯聞之皆朝於齊詩云靖恭爾位好是正直神之聽之介爾景福此之謂也景公探爵鷇鷇弱故反之晏子聞之不待而入見公汗出惕然晏子曰君胡為者也景公曰我探爵鷇鷇弱故反之晏子逡巡北面再拜而賀曰吾君有聖王之道矣景公曰寡人探爵鷇鷇弱故反之其當聖王之道者何也晏子對曰君探爵鷇鷇弱故反之是長幼也吾君仁愛曾禽獸之加焉而況於人乎此聖王之道也景公覩嬰兒有乞於途者公曰是無歸夫晏子對曰君存何為無歸使吏養之可立而以聞景公遊於壽宮覩長年負薪者而有飢色公悲之喟然令吏養之晏子曰臣聞之樂賢而哀不肖守國之本也今君愛老而恩無所不逮治國之本也公笑有喜色晏子曰聖王見賢以樂賢見不肖以哀不肖今請求老弱之不養鰥寡之不室者論而供秩焉景公曰諾於是老弱有養鰥寡有室桓公之平陵見家人有年老而自養者公問其故對曰吾有子九人家貧無以妻之吾使傭而未返也桓公取外御者五人而妻之管仲入見曰公之施惠不亦小矣公曰何也對曰公待所見而施惠焉則齊國之有妻者少矣公曰若何管仲曰令國丈夫二十而室女子十五而嫁孝宣皇帝初即位守廷尉吏路溫舒上書言尚德緩刑其詞曰陛下初即至尊與天合符宜改前世之失正始受之統滌煩文除民疾存亡繼絶以應天德天下幸甚臣聞往者秦有十失其一尚存治獄之吏是也昔秦之時滅文學好武勇賤仁義之士貴治獄之吏正言謂之誹謗遏過謂之妖言故盛服先生不用於世忠良切言皆鬱於胸譽諛之聲日滿於耳虛美薰心實禍蔽塞此乃秦之所以亡天下也方今海內賴陛下厚恩無金革之危飢寒之患父子夫婦勠力安家天下幸甚然太平之未洽者獄亂之也夫獄者天下之大命也死者不可復生斷者不可復屬書曰與其殺不辜寧失不經今治獄吏則不然上下相驅以刻為明深者獲公名平者多後患故治獄吏皆欲入死非憎人也自安之道在人之死是以死人之血流離於市被刑之徒比肩而立大辟之計歲以萬數此聖人之所以傷也太平之未洽凡以是也人情安則樂生痛則思死捶楚之下何求而不得故囚人不勝痛則飾誣詞以示之吏治者利其然則指道以明之上奏恐卻則鍛鍊而周內之蓋奏當之成雖皋陶聽之猶以為死有餘罪何則成鍊之者衆而文致之罪明也是以獄吏專為深刻殘賊而無極偷為一切不顧國患此世之大賊也故俗語云畫地作獄議不可入刻木為吏期不可對此皆疾吏之風悲痛之辭也故天下之患莫深於獄敗法亂政離親塞道莫甚乎治獄之吏此臣所謂一尚存者也臣聞鳥鷇之卵不毀而後鳳凰集誹謗之罪不誅而後良言進故傳曰山藪藏疾川澤納污瑾瑜匿惡國君含垢天之道也臣昧死上聞願陛下察誹謗聽切言開天下之口廣針諫之路改亡秦之一失遵文武之嘉德省法制寬刑罰以廢煩獄則太平之風可興於世福履和樂與天無極天下幸甚書奏皇帝善之後卒為臨淮太守晉平公春築臺叔向曰不可古者聖王貴德而務施緩刑辟而趨民時今春築臺是奪民時也夫德不施則民不歸刑不緩則百姓愁使不歸之民役愁怨之百姓而又奪其時是重竭也夫牧百姓養育之而重竭之豈所以定命安存而稱為人君於後世哉平公曰善乃罷臺役趙簡子春築臺於邯鄲天雨而不息謂左右曰可無趨種乎尹鐸對曰公事急措種而懸之臺夫雖欲趨種不能得也簡子惕然乃釋臺罷役曰我以臺為急不如民之急也民以不為臺故知吾之愛也中行獻子將伐鄭范文子曰不可得志於鄭諸侯讎我憂必滋長郤至又曰得鄭是兼國也兼國則王王者固多憂乎文子曰王者盛其德而遠人歸故無憂今我寡德而有王者之功故多憂今子見無土而欲富樂者乎哉季康子謂子遊曰仁者愛人乎子遊曰然人亦愛之乎子遊曰然康子曰子産死鄭人丈夫捨玦珮婦人舍珠珥夫婦巷哭三月不聞竽瑟之聲仲尼之死吾不聞魯國之愛夫子奚也子遊曰譬子産之與夫子其猶浸水之與天雨乎浸水所及則生不及則死斯民之生也必以時雨既以生莫愛其賜故曰譬子産之與夫子也猶浸水之與天雨乎中行穆子圍鼓鼓人有以城反者不許軍吏曰師徒不勤可得城奚故不受曰有以吾城反者吾所甚惡也人以城來我獨奚好焉賞所甚惡是失賞也若所好何若其不賞是失信也奚以示民鼓人又請降使人視之其民尚有食也不聽鼓人告食盡力竭而後取之克鼓而反不戮一人孔子之楚有漁者獻魚甚強孔子不受獻魚者曰天暑市遠賣之不售思欲棄之糞壤不若獻之君子孔子再拜而受使弟子掃除將祭之弟子曰夫人將棄之今夫子將祭之何也孔子曰吾聞之務施而不腐餘財者聖人也今受聖人之賜可無祭乎鄭伐宋宋人將與戰華元殺羊食士其御羊斟不與焉及戰曰疇昔之羊羹子為政今日之事我為政與華元馳入鄭師宋人敗績楚王問莊辛曰君子之行奈何莊辛對曰居不為垣牆人莫能毀傷行不從周衛人莫能暴害此君子之行也楚王復問曰君子之富奈何對曰君子之富假貸人不德也不責也其食飲人不使也不役也親戚愛之衆人善之不肖者事之皆欲其壽樂而不傷於患此君子之富也楚王曰善丞相西平侯于定國者東海下邳人也其父號曰于公為縣獄吏決曹掾決獄平法未嘗有所冤郡中離文法者于公所決皆不敢隱情東海郡中為于公生立祠命曰于公祠東海有孝婦無子少寡養其姑甚謹其姑欲嫁之終不肯其姑告鄰之人曰孝婦養我甚謹我哀其無子守寡日久我老纍丁壯奈何其後母自經死母女告吏曰婦殺我母吏捕孝婦孝婦辭不殺姑吏欲毒治孝婦自誣服具獄以上府于公以為養姑十年以孝聞此不殺姑也太守不聽數爭不能得於是于公辭疾去吏太守竟殺孝婦郡中枯旱三年後太守至卜求其故于公曰孝婦不當死前太守強殺之咎當在此於是殺牛祭孝婦冢太守以下自至焉天立大雨歲豐熟郡中以此益敬重于公于公築治廬舍謂匠人曰為我高門我治獄未嘗有所冤我後世必有封侯者令容高蓋駟馬車及子封為西平侯孟簡子相梁并衛有罪而走齊管仲迎而問之曰吾子相梁并衛之時門下使者幾何人矣孟簡子曰門下使者有三千餘人管仲曰今與幾何人來對曰臣與三人俱仲曰是何也對曰其一人父死無以葬我為葬之一人母死無以葬亦為葬之一人兄有獄我為出之是以得三人來管仲上車曰嗟茲乎我窮必矣吾不能以春風風人吾不能以夏雨雨人吾窮必矣凡人之性莫不欲善其德然而不能為善德者利敗之也故君子羞言利名言利名尚羞之況居而求利者乎周天子使家父毛伯求車求金於諸侯春秋譏之故天子好利則諸侯貪諸侯貪則大夫鄙大夫鄙則庶人盜上之變下猶風之靡草也故為人君者明貴德而賤利以道下下之為惡尚不可止今隱公貪利而身自漁濟上而行八佾以此化於國人國人安得不解於義解於義而縱其欲則災害起而臣下僻矣故其五年始書螟言災將起國家將亂云爾孫卿曰夫鬭者忘其身者也忘其親者也忘其君者也行須臾之怒而鬭終身之禍然乃為之是忘其身也家室離散親戚被戮然乃為之是忘其親也君上之所致惡刑法之所大禁也然乃犯之是忘其君也今禽獸猶知近父母不忘其親也人而忘其身內忘其親上忘其君是不若禽獸之仁也凡鬭者皆自以為是而以他人為非也己誠是也人誠非也則是己君子而彼小人也夫以君子而與小人相賊害是人之所謂以狐白補犬羊身塗其炭豈不過甚矣哉以為智乎則愚莫大焉以為利乎則害莫大焉以為榮乎則辱莫大焉人之有鬭何哉比之狂惑疾病乎則不可面目人也而好惡多同人之鬭誠愚惑失道者也詩云式號式呼俾晝作夜言鬭行也子路持劍孔子問曰由安用此乎子路曰善古者固以善之不善古者固以自衛孔子曰君子以忠為質以仁為衛不出環堵之內而聞千里之外不善以忠化寇暴以仁圍何必持劍乎子路曰由也請攝齊以事先生矣樂羊為魏文侯將以攻中山其子時在中山中山懸其子以示樂羊樂羊不為衰志攻之愈急中山因烹其子而遺之羹樂羊食之盡一柸中山見其誠也不忍與其戰果下之遂為文侯開地文侯賞其功而疑其心孟孫獵得麑使秦西巴持歸其母隨而鳴秦西巴不忍縱而與之孟孫怒而逐秦西巴居一年召以為子傅左右曰夫秦西巴有罪於君今以為子傅何也孟孫曰夫以一麑而不忍又將能忍吾子乎故曰巧詐不如拙誠樂羊以有功而見疑秦西巴以有罪而益信由仁與不仁也智伯還自衛三卿燕于藍臺智襄子戲韓康子而侮段規智果聞之諫曰主弗備難難必至矣曰難將由我我不為難誰敢興之對曰異於是夫郤氏有車轅之難趙有孟姬之讒欒有叔祁之訴范中行有函冶之難皆主之所知也夏書有之曰一人三失怨豈在明不見是圖周書有之曰怨不在大亦不在小夫君子能勤小物故無大患今主一謀而愧人君相又弗備曰不敢興難毋乃不可乎嘻不可不懼蚋蟻蜂蠆皆能害人況君相乎不聽自是五年而有晉陽之難段規反而殺智伯于師遂滅智氏智襄子為室美士茁夕焉智伯曰室美矣夫對曰美則美矣抑臣亦有懼也智伯曰何懼對曰臣以秉筆事君記有之曰高山浚源不生草木松柏之地其土不肥今土木勝人臣懼其不安人也室成三年而智氏亡
