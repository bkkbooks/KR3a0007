body:
  text: 君道晉平公問於師曠曰人君之道如何對曰人君之道清淨無為務在博愛趨在任賢廣開耳目以察萬方不固溺於流俗不拘繫於左右廓然遠見踔然獨立屢省考績以臨臣下此人君之操也平公曰善齊宣王謂尹文曰人君之事何如尹文對曰人君之事無為而能容下夫事寡易從法省易因故民不以政獲罪也大道容衆大德容下聖人寡為而天下治矣書曰睿作聖詩人曰岐有夷之行子孫其保之宣王曰善成王封伯禽為魯公召而告之曰爾知為人上之道乎凡處尊位者必以敬下順德規諫必開不諱之門蹲節安靜以藉之諫者勿振以威毋格其言博采其辭乃擇可觀夫有文無武無以威下有武無文民畏不親文武俱行威德乃成既成威德民親以服清白上通巧佞下塞諫者得進忠信乃畜伯禽再拜受命而辭陳靈公行僻而言失泄冶曰陳其亡矣吾驟諫君君不吾聽而愈失威儀夫上之化下猶風靡草東風則草靡而西西風則草靡而東在風所由而草為之靡是故人君之動不可不慎也夫樹曲木者惡得直影人君不直其行不敬其言者未有能保帝王之號垂顯令之名者也易曰夫君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出於身加於民行發乎邇見乎遠言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎天地動而萬物變化詩曰慎爾出話敬爾威儀無不柔嘉此之謂也今君不是之慎而縱恣焉不亡必弒靈公聞之以泄冶為妖言而殺之後果弒於徵舒魯哀公問於孔子曰吾聞君子不博有之乎孔子對曰有之哀公曰何為其不博也孔子對曰為其有二乘哀公曰有二乘則何為不博也孔子對曰為其兼行惡道也哀公懼焉有間曰若是乎君子之惡惡道之甚也孔子對曰君子之惡惡道不能甚則其好善道亦不能甚好善道不能甚則百姓之親之也亦不能甚詩云未見君子憂心惙惙亦既見止亦既覯止我心則悅詩之好善道之甚也如此哀公曰善哉吾聞君子成人之美不成人之惡微孔子吾焉聞斯言也哉河間獻王曰堯存心於天下加志於窮民痛萬姓之罹罪憂衆生之不遂也故有一民飢則曰此我飢之也有一人寒則曰此我寒之也一民有罪則曰此我陷之也仁昭而義立德博而化廣故不賞而民勸不罰而民治先恕而後教是堯道也當舜之時有苗氏不服其所以不服者大山在其南殿山在其北左洞庭之波右彭蠡之川用此險也所以不服禹欲伐之而舜不許曰吾諭教猶未竭也究諭教焉而有苗氏請服天下聞之皆非禹之義而歸舜之德周公踐天子之位布德施惠遠而逾明十二牧方三人使出舉遠方之民有飢寒而不得衣食者有獄訟而失職者有賢才而不舉者以入告乎天子天子於其君之朝也揖而進之曰意朕之政教有不得者與何其所臨之民有飢寒而不得衣食者有獄訟而失職者有賢才而不舉者也其君歸也乃召其國大夫告用天子之言百姓聞之皆喜曰此誠天子也何居之深遠而見我之明也豈可欺哉故牧者所以辟四門明四目達四聰也是以近者親之遠者安之詩曰柔遠能邇以定我王此之謂矣河間獻王曰禹稱民無食則我不能使也功成而不利於人則我不能勸也故疏河以導之鑿江通於九派釃五湖而定東海民亦勞矣然而不怨苦者功成而利歸於民也禹出見罪人下車問而泣之左右曰夫罪人不順道故使然焉君王何為痛之至於此也禹曰堯舜之人皆以堯舜之心為心今寡人為君也百姓各自以其心為心是以痛之也書曰百姓有罪在豫一人虞人與芮人質其成於文王入文王之境則見其人民讓為士大夫入其國則見其士大夫讓為公卿二國者相謂曰其人民讓為士大夫其士大夫讓為公卿然則此其君亦讓以天下而不居矣二國者未見文王之身而讓其所爭以為間田而反孔子曰大哉文王之道乎其不可加矣不動而變無為而成敬慎恭己而虞芮自平故書曰惟文王之敬忌此之謂也成王與唐叔虞燕居剪梧桐葉以為圭而授唐叔虞曰余以此封汝唐叔虞喜以告周公周公以請曰天子封虞耶成王曰余一與虞戲也周公對曰臣聞之天子無戲言天子言則史書之工誦之士稱之於是遂封唐叔虞於晉周公旦可謂善説矣一稱而成王益重言明愛弟之義有輔王室之固當堯之時舜為司徒契為司馬禹為司空后稷為田疇夔為樂正倕為工師伯夷為秩宗皋陶為大理益掌驅禽堯體力便巧不能為一焉堯為君而九子者為臣其何故也堯知九職之事使九子者各受其事皆勝其任以成九功堯遂成厥功以王天下是故知人者主道也知事者臣道也主道知人臣道知事毋亂舊法而天下治矣湯問伊尹曰三公九卿二十七大夫八十一元士知之有道乎伊尹對曰昔者堯見人而知舜任人然後知禹以成功舉之夫三君之舉賢皆異道而成功然尚有失者況無法度而任己直意用人必大失矣故君使臣自貢其能則萬一之不失矣王者何以選賢夫王者得賢材以自輔然後治也雖有堯舜之明而股肱不備則主恩不流化澤不行故明君在上慎於擇士務於求賢設四佐以自輔有英俊以治官尊其爵重其祿賢者進以顯榮罷者退而勞力是以主無遺憂下無邪慝百官能治臣下樂職恩流群生潤澤草木昔者虞舜左禹右皋陶不下堂而天下治此使能之效也武王問太公曰舉賢而以危亡者何也太公曰舉賢而不用是有舉賢之名而不得真賢之實也武王曰其失安在太公曰其失在君好用小善而已不得真賢也武王曰好用小善者何如太公曰君好聽譽而不惡讒也以非賢為賢以非善為善以非忠為忠以非信為信其君以譽為功以毀為罪有功者不賞有罪者不罰多黨者進少黨者退是以群臣比周而蔽賢百吏群黨而多姦忠臣以誹死於無罪邪臣以譽賞於無功其國見於危亡武王曰善吾今日聞誹譽之情矣武王問太公曰得賢敬士或不能以為治者何也太公對曰不能獨斷以人言斷者殃也武王曰何為以人言斷太公對曰不能定所去以人言去不能定所取以人言取不能定所為以人言為不能定所罰以人言罰不能定所賞以人言賞賢者不必用不肖者不必退而士不必敬武王曰善其為國何如太公對曰其為人惡聞其情而喜聞人之情惡聞其惡而喜聞人之惡是以不必治也武王曰善齊桓公問於寧戚曰管子今年老矣為棄寡人而就世也吾恐法令不行人多失職百姓疾怨國多盜賊吾何如而使姦邪不起民足衣食乎寧戚對曰要在得賢而任之桓公曰得賢奈何寧戚對曰開其道路察而用之尊其位重其祿顯其名則天下之士騷然舉足而至矣桓公曰既以舉賢士而用之矣微夫子幸而臨之則未有布衣屈奇之士踵門而求見寡人者寧戚對曰是君察之不明舉之不顯而用之疑官之卑祿之薄也且夫國之所以不得士者有五阻焉主不好士諂諛在旁一阻也言便事者未嘗見用二阻也壅塞掩蔽必因近習然後見察三阻也訊獄詰窮其辭以法過之四阻也執事適欲擅國權命五阻也去此五阻則豪俊並興賢智來處五阻不去則上蔽吏民之情下塞賢士之路是故明王聖主之治若夫江海無不受故長為百川之主明王聖君無不容故安樂而長久因此觀之則安主利人者非獨一士也桓公曰善吾將著夫五阻以為戒本也齊景公問於晏子曰寡人欲從夫子而善齊國之政可乎對曰嬰聞之國有具官而后政可善景公作色不説曰齊國雖小則何為不具官乎對曰此非臣之所復也昔先君桓公身體墮懈辭令不給則隰朋侍左右多過刑罰不中則弦章侍居處肆縱左右懾畏則東郭牙侍田野不修人民不安則寧戚侍軍吏怠戎士偷則王子成父侍德義不中信行衰微則管子侍先君能以人之長續其短以人之厚補其薄是以辭令窮遠而不逆兵加於有罪而不頓是故諸侯朝其德而天子致其胙今君之失多矣未有一士以聞者也故曰官未具景公曰善景公謂晏子曰吾聞高繚與夫子遊寡人請見之晏子對曰臣聞之為地戰者不能成王為祿仕者不能成政若高繚與嬰為兄弟久矣未嘗干嬰之過補嬰之闕特祿仕之臣也何足以補君燕昭王問於郭隗曰寡人地狹人寡齊人取薊八城胸奴驅馳樓煩之下以孤之不肖得承宗廟恐危社稷存之有道乎郭隗曰有然恐王之不能用也昭王避席願請聞之郭隗曰帝者之臣其名臣也其實師也王者之臣其名臣也其實友也霸者之臣其名臣也其實賓也危國之臣其名臣也其實虜也今王將東面目指氣使以求臣則廝役之材至矣南面聽朝不失揖讓之禮以求臣則人臣之材至矣西面等禮相亢下之以色不乘之以勢以求臣則朋友之材至矣北面拘指逡巡而退以求臣則師傅之材至矣如此則上可以王下可以霸唯王擇焉燕王曰寡人願學而無師郭隗曰王誠欲興道隗請為天下之士開路於是燕王常置郭隗上坐南面居三年蘇子聞之從周歸燕鄒衍聞之從齊歸燕樂毅聞之從趙歸燕屈景聞之從楚歸燕四子畢至果以弱燕并強齊夫燕齊非均權敵戰之國也所以然者四子之力也詩曰濟濟多士文王以寧此之謂也楚莊王既服鄭伯敗晉師將軍子重三言而不當莊王歸過申侯之邑申侯進飯日中而王不食申侯請罪莊王喟然歎曰吾聞之其君賢君也而又有師者王其君中君也而又有師者霸其君下君也而群臣又莫若君者亡今我下君也而群臣又莫若不穀不穀恐亡且世不絶聖國不絶賢天下有賢而我獨不得若吾生者何以食為故莊王戰服大國義從諸侯戚然憂恐聖知不在乎身自惜不肖思得賢佐日中忘飯可謂明君矣明主者有三懼一曰處尊位而恐不聞其過二曰得意而恐驕三曰聞天下之至言而恐不能行何以識其然也昔者越王勾踐與吳人戰大敗之兼有九夷當是時也君南面而立近臣三遠臣五令群臣曰聞吾過而不告者其罪刑此處尊位而恐不聞其過者也昔者晉文公與楚人戰大勝之燒其軍火三日不滅文公退而有憂色侍者曰君大勝楚今有憂色何也文公曰吾聞能以戰勝而安者其唯聖人乎若夫詐勝之徒未嘗不危也吾是以憂也此得意而恐驕者也昔齊桓公得管仲隰朋辨其言説其義正月之朝令具太牢進之先祖桓公西面而立管仲隰朋東面而立桓公贊曰自吾得聽二子之言也吾目加明耳加聰不敢獨擅願薦之先祖此聞天下之至言而恐不能行者也齊景公出獵上山見虎下澤見蛇歸召晏子而問之曰今日寡人出獵上山則見虎下澤則見蛇殆所謂不祥也晏子對曰國有三不祥是不與焉夫有賢而不知一不祥也知而不用二不祥也用而不任三不祥也所謂不祥乃若此者也今上山見虎虎之室也下澤見蛇蛇之穴也如虎之室如蛇之穴而見之曷為不祥也楚莊王好獵大夫諫曰晉楚敵國也楚不謀晉晉必謀楚今王無乃耽於樂乎王曰吾獵將以求士也其榛藂刺虎豹者吾是以知其勇也其攫犀搏兕者吾是以知其徑有力也罷田而分所得吾是以知其仁也因是道也而得三士焉楚國以安故曰苟有志則無非事者此之謂也湯之時大旱七年雒坼川竭煎沙爛石於是使人持三足鼎祝山川教之祝曰政不節耶使人疾耶苞苴行耶讒夫昌耶宮室營耶女謁盛耶何不雨之極也蓋言未已而天大雨故天之應人如影之隨形響之效聲者也詩云上下奠瘞靡神不宗言疾旱也殷太戊時有桑榖生於庭昏而生比旦而拱史請卜之湯廟太戊從之卜者曰吾聞之祥者福之先者也見祥而為不善則福不生殃者禍之先者也見殃而能為善則禍不至於是乃早朝而晏退問疾弔喪三日而桑榖自亡高宗者武丁也高而宗之故號高宗成湯之後先王道缺刑法違犯桑榖俱生乎朝七日而大拱武丁召其相而問焉其相曰吾雖知之吾弗得言也問諸祖己祖己曰桑榖者野草也而生於朝意者國亡乎武丁恐駭飭身修行思昔先王之政興滅國繼絶世舉逸民明養老之道三年之後蠻夷重譯而朝者十有六國此之謂存亡繼絶之主是以高而尊之也宋大水魯人弔之曰天降淫雨溪谷滿盈延及君地以憂執政使臣敬弔宋人應之曰寡人不佞齋戒不謹邑封不修使人不時天加以殃又遺君憂拜命之辱君子聞之曰宋國其庶幾乎問曰何謂也曰昔者夏桀殷紂不任其過其亡也忽焉成湯文武知任其過其興也勃焉夫過而改之是猶不過也故曰其庶幾乎宋人聞之夙興夜寐早朝晏退弔死問疾戮力宇內三年歲豐政平嚮使宋人不聞君子之語則年穀未豐而國未寧詩曰佛時仔肩示我顯德行此之謂也楚昭王有疾卜之曰河為祟大夫請用三牲焉王曰止古者先王割地制土祭不過望江漢睢漳楚之望也禍福之至不是過也不穀雖不德河非所獲罪也遂不祭焉仲尼聞之曰昭王可謂知大道矣其不失國宜哉楚昭王之時有雲如赤鳥夾日而飛三日昭王患之使人乘馹東而問諸太史州黎州黎曰將虐於王身以令尹司馬説焉則可令尹司馬聞之宿齋沐浴將自以身禱之焉王曰止楚國之有不穀也由身之有胸脅也其有令尹司馬也由身之有股肱也胸脅有疾轉之股肱庸為去是人也邾文公卜徙於繹史曰利於民而不利於君君曰苟利於民寡人之利也天生蒸民而樹之君以利之也民既利矣孤必與焉侍者曰命可長也君胡不為君曰命在牧民死之短長時也民苟利矣吉孰大焉遂徙於繹楚莊王見天不見妖而地不出孽則禱於山川曰天其忘豫歟此能求過於天必不逆諫矣安不忘危故能終而成霸功焉湯曰藥食先嘗於卑然後至於貴藥言先獻於貴然後聞於卑故藥食嘗乎卑然後至乎貴教也藥言獻於貴然後聞於卑道也故使人味食然後食者其得味也多使人味言然後聞者其得言也少是以明上之於言也必自他聽之必自他聞之必自他擇之必自他取之必自他聚之必自他藏之必自他行之故道以數取之為明以數行之為章以數施之萬物為藏是故求道者不以目而以心取道者不以手而以耳楚文王有疾告大夫曰管饒犯我以義違我以禮與處不安不見不思然吾有得焉必以吾時爵之申侯伯吾所欲者勸我為之吾所樂者先我行之與處則安不見則思然吾有喪焉必以吾時遣之大夫許諾乃爵管饒以大夫贈申侯伯而行之申侯伯將之鄭王曰必戒之矣而為人也不仁而欲得人之政毋以之魯衛宋鄭不聽遂之鄭三年而得鄭國之政五月而鄭人殺之趙簡子與欒激遊將沉於河曰吾嘗好聲色矣而欒激致之吾嘗好宮室臺榭矣而欒激為之吾嘗好良馬善御矣而欒激求之今吾好士六年矣而欒激未嘗進一人是進吾過而黜吾善也或謂趙簡子曰君何不更乎簡子曰諾左右曰君未有過何更君曰吾謂是諾未必有過也吾將求以來諫者也今我卻之是卻諫者諫者必止我過無日矣韓武子田獸已聚矣田車合矣傳來告曰晉公薨武子謂欒懷子曰子亦知吾好田獵也獸已聚矣田車合矣吾可以卒獵而後弔乎懷子對曰范氏之亡也多輔而少拂今臣於君輔也畾於君拂也君胡不問於畾也武子曰盈而欲拂我乎而拂我矣何必畾哉遂輟田師經鼓琴魏文侯起舞賦曰使我言而無見違師經援琴而撞文侯不中中旒潰之文侯顧謂左右曰為人臣而撞其君其罪如何左右曰罪當烹提師經下堂一等師經曰臣可得一言而死乎文侯曰可師經曰昔堯舜之為君也唯恐言而人不違桀紂之為君也唯恐言而人違之臣撞桀紂非撞吾君也文侯曰釋之是寡人之過也懸琴於城門以為寡人符不補旒以為寡人戒齊景公遊於蔞聞晏子卒公乘輿素服馹而驅之自以為遲下車而趨知不若車之速則又乘比至於國者四下而趨行哭而往矣至伏尸而號曰子大夫日夜責寡人不遺尺寸寡人猶且淫佚而不收怨罪重積於百姓今天降禍於齊國不加於寡人而加於夫子齊國之社稷危矣百姓將誰告矣晏子沒十有七年景公飲諸大夫酒公射出質堂上唱善若出一口公作色太息播弓矢弦章入公曰章自吾失晏子於今十有七年未嘗聞吾不善今射出質而唱善者若出一口弦章對曰此諸臣之不肖也知不足以知君之不善勇不足以犯君之顏色然而有一焉臣聞之君好之則臣服之君嗜之則臣食之夫尺蠖食黃則其身黃食蒼則其身蒼君其猶有諂人言乎公曰善今日之言章為君我為臣是時海人入魚公以五十乘賜弦章弦章歸魚乘塞塗撫其御之手曰曩之唱善者皆欲若魚者也昔者晏子辭賞以正君故過失不掩今諸臣諂諛以干利故出質而唱善如出一口今所輔於君未見於衆而受若魚是反晏子之義而順諂諛之欲也固辭魚不受君子曰弦章之廉乃晏子之遺行也夫天之生人也蓋非以為君也天之立君也蓋非以為位也夫為人君行其私欲而不顧其人是不承天意忘其位之所以宜事也如此者春秋不豫能君而夷狄之鄭伯惡一人而兼棄其師故有夷狄不君之辭人主不以此自省惟既以失實心奚因知之故曰有國者不可以不學春秋此之謂也齊人弒其君魯襄公援戈而起曰孰臣而敢殺其君乎師懼曰夫齊君治之不能任之不肖縱一人之欲以虐萬夫之性非所以立君也其身死自取之也今君不愛萬夫之命而傷一人之死奚其過也其臣已無道矣其君亦不足惜也孔子曰文王似元年武王似春王周公似正月文王以王季為父以太任為母以太姒為妃以武王周公為子以泰顛閎夭為臣其本美矣武王正其身以正其國正其國以正天下伐無道刑有罪一動而天下正其事正矣春致其時萬物皆及生君致其道萬人皆及治周公戴己而天下順之其誠至矣尊君卑臣者以勢使之也夫勢失則權傾故天子失道則諸侯尊矣諸侯失政則大夫起矣大夫失官則庶人興矣由是觀之上不失而下得者未嘗有也孔子曰夏道不亡商德不作商德不亡周德不作周德不亡春秋不作春秋作而後君子知周道亡也故上下相虧也猶水火之相滅也人君不可不察而大盛其臣下此私門盛而公家毀也人君不察焉則國家危殆矣管子曰權不兩錯政不二門故曰脛大於股者難以步指大於臂者難以把本小末大不能相使也司城子罕相宋謂宋君曰國家之危定百姓之治亂在君之行賞罰也賞當則賢人勸罰得則姦人止賞罰不當則賢人不勸姦人不止姦邪比周欺上蔽主以爭爵祿不可不慎也夫賞賜讓與者人之所好也君自行之刑罰殺戮者人之所惡也臣請當之君曰善子主其惡寡人行其善吾知不為諸侯笑矣於是宋君行賞賜而與子罕刑罰國人知刑戮之威專在子罕也大臣親之百姓附之居不期年子罕逐其君而專其政故曰無弱君而強大夫老子曰魚不可脫於淵國之利器不可以借人此之謂也
