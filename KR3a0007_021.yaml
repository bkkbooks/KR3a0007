body:
  text: 説苑佚文輯閔子騫兄弟二人母死其父更娶復有二子子騫為其父御車失轡父持其手衣甚單父則歸呼其後母兒持其手衣甚厚溫即謂其婦曰吾所以娶汝乃為吾子今汝欺我去無留子騫前曰母在一子單母去四子寒其父默然故曰孝哉閔子騫一言其母還再言三子溫藝文類聚卷二十頁三六九引晉靈公造九層臺費用千億謂左右曰敢有諫者斬孫息乃諫曰臣能纍十三博棊加九雞子其上公曰吾少學未嘗見也子為寡人作之孫息即以棊子置其下加九雞子其上左右懾懼靈公扶伏氣息不續公曰危哉危哉孫息曰臣謂是不危也復有危此者公曰願復見之孫息曰九層之臺三年不成男不得耕女不得織國用空虛戶口減少吏民叛亡鄰國謀議將興兵社稷亡滅君何所望靈公曰寡人之過乃至於此即壞九層之臺類聚卷二四頁四三六引孫息學悲歌古琴即引琴作鄭衛之音靈公大感故作衛公之曲歌而和之北堂書鈔卷一百六頁四零九引齊王起九重之臺募國中能畫者賜之錢有敬君居常飢寒其妻妙色敬君工畫貪賜畫臺去家日久思憶其妻遂畫其像向之而笑傍人見以白王王召問之對曰有妻如此去家日久心常念之竊畫其像以慰離心不悟上聞王即設酒與敬君相樂謂敬君曰國中獻女無好者以錢百萬請妻可乎不者殺汝敬君慞惶聽許類聚卷三二頁五六一太平御覽卷三八一頁一七五八引呂望年七十釣于渭渚三日三夜魚無食者與農人言農人者古之老賢人也謂望曰子將復釣必細其綸芳其餌徐徐而投之無令魚駭望如其言初下得鮒次得鯉刳腹得書書文曰呂望封于齊望知當貴類聚卷六六頁一一七八引齊遣淳于髡到楚為人短小楚王甚薄之謂曰齊無人耶而使子來子何長也對曰臣無所長臣腰中七尺之劍欲斬無狀王王曰止吾但戲子耳即與髡共飲酒楚王謂淳于髡曰吾有仇在吳子寧能為吾報之乎對曰臣見來道旁野民持一頭魚上田祝曰高得萬束下得千斛臣竊笑之以為禮薄而望多也王今與吾半日之樂而委以吳王非其計楚王默然御覽卷三七八頁一七四五類聚卷九六頁一六七一及御覽卷七三六頁三二六四引晉文公伐楚歸國行賞狐偃為首或曰城濮之事先軫之謀文公曰城濮之事偃説我無失信不背三舍之約先軫所謀軍事吾用之以勝然此一時之説偃言萬世之功奈何以一時之利而加萬世功乎是以先之衆人悅服御覽卷二七九頁一三零二引梁君出獵見白鴈群梁君下車彀弓欲射之道有行者觀勸梁君止鴈群駭梁君怒欲殺行者其御公孫龍下車對曰昔者齊景公之時天旱三年卜之曰必以人祠乃雨景公曰吾昔所以求雨者為吾民也今以人祠乃雨寡人將自當之言未卒天大雨方千里今主君以白鴈故而欲殺之無異於狼虎梁君援其手與上車歸入郭門呼萬歲曰樂哉今日獵也獨得善言御覽卷三百九十頁一八零四引齊遣兵攻魯見一婦人將兩小兒走抱小而挈大顧見大軍且至抱大而挈小使者甚怪問之婦人曰大者妾夫兄之子小者妾之子夫兄子者公義也妾之子者私義也寧濟公而廢私耶使者悵然賢其辭即罷軍還對齊王説之曰魯未可攻也匹婦之義尚如此何況朝廷之臣乎御覽卷四二二頁一九四八引魯有賢女次室之子年適二十明曉經書常侍立而吟涕泣如雨有識謂之曰汝欲嫁耶何悲之甚對曰魯君年老太子尚小憂其姦臣起矣御覽卷四六九頁二一五六引趙襄子問王離曰國之所以亡者何也對曰君吝而能忍是以亡爾襄子曰何以為然也曰吝則不能賞賢忍則不能罰罪賢者不賞罪者不罰不亡何也御覽卷六三三頁二八四零引蘇秦至齊齊王厚待之諸大夫嫉之使人刺秦而不死齊王出珍寶賞募求賊不得蘇秦垂死謂齊王曰王誠能為臣求賊者臣死後請車裂臣尸於市詢之曰蘇秦為燕欲亂齊今日其死寡人甚喜故裂之若得其殺主重封賞之如此刺臣者必出矣齊王從其言裂尸而詢之刺秦者果出求賞御覽卷六三三頁二八四零引北塞上之人其馬亡入胡中人皆弔之其父曰此何詎知不為福居數月其馬將胡駿馬而歸人皆賀之其父曰此何詎知不為禍家富馬良其子好騎墮而折髀人皆弔之其父曰此何詎知不為福居一年胡夷大出丁壯者皆控弦而戰塞上之人死者十九此子獨以跛故父子相保御覽卷八九六頁三九八零引晉平公問趙武曰中牟三國之股肱邯鄲之肩髀也寡人欲得其良令也其令空誰使而可趙武曰邢伯子可公曰邢子非子之讎邪對曰私讎不入公門又問曰中府之令空誰使而可趙武曰臣子可故外舉不避讎內舉不避子類聚卷五十頁九零七引龜千歲能與人言類聚卷九六頁一六六八引鼓法天鐘法地書鈔卷一百八頁四一二引勇士孟賁水行不避蛟龍陸行不避虎狼文選羽獵賦注頁一六八引聲樂易良而合於歌情盡舞意文選舞賦注頁三二零引子奇年十八齊君使主東阿東阿大化後漢書胡廣傳注頁一五零八引晉平公時赤地千里後漢書臧宮傳注頁六九六引王國子前母子伯奇後母子伯封後母欲其子立為太子説王曰伯奇好妾王不信其母曰令伯奇於後園妾過其旁王上臺視之即可知王如其言伯奇入園後母陰取蜂十數置單衣中過伯奇邊曰蜂螫我伯奇就衣中取蜂殺之王遙見之乃逐伯奇也後漢書黃瓊傳注頁二零三九引晉文公饗炙而髮繞之宰曰佩刀砥礪利由干將切肉斷而髮不絶臣罪一也愛誅貫臠而不見髮臣罪二也爐炭赤紅而髮不絶臣罪三也文公曰噫此有所在乃召次宰詰之果服也書鈔卷五五頁一七五引柳下惠死人將誄之妻曰將述夫子之德二三子不若妾之知為誄曰夫子之不伐夫子之不謁諡宜為惠弟子聞而從之書鈔卷一百二頁三九一引子曰以容取人失之子羽以言取人失之宰豫淡臺子羽君子之容也與之久處而言不克其貌宰豫之辭雅而文也與之久處而智不克其辨宋薛據孔子集語楚昭王篇引衛靈公天寒鑿池宛春諫曰天寒起役恐怠民也公曰寒乎春曰公衣狐裘坐熊席是以不寒民寒甚矣公乃罷役御覽卷二七頁一二七引淳于髡三稱鄒忌三知之髡等辭屈而去故所以尚干將莫耶者貴於立斷文選答東阿王箋注頁七五零引殷法棄灰於街者刑書鈔卷四三頁一二一引辟雍天子鄉飲之處御覽卷五三四頁二四二二引秦二世立枉矢夜光俄而天下大亂二世被殺御覽卷八七五頁三八八四引禹之化天下也以五聲聽門懸鐘鼓鐸磬而置鞀以待四海之士初學記卷九頁二零六引文公好食昌本葅本草即菖蒲御覽卷九九九頁四四二一引公孫僑相鄭路不拾遺桃李垂街人不敢取御覽卷九六七頁四二八八引梁上鼠飽聞長者論御覽卷九一一頁四零三七引楚文侯曰邑中豪好蔽善而揚惡可親問之文選東京賦注樗里子且死曰葬我必於渭南章臺東後百年當有天子宮夾我墓及漢興長樂宮在其東未央宮在其西武庫直其上事文須聚五六古今合璧事類備要六六昔隨侯行遇大蛇中斷疑其靈使人以藥封之蛇乃能去因號其處斷蛇丘歲餘蛇銜明珠徑寸絶白而有光因號隨珠史記李斯傳正義子奇年十八齊君使治阿既行齊君悔之遣使追追者返曰子奇必能矣共載者皆白首者也子奇至阿鑄庫兵以為耕器魏聞童子為君庫無兵倉無粟乃起兵擊之阿人父率子兄率弟以私兵戰遂敗魏師文選潘正叔贈河陽詩注高平王遣使者從魏文侯貸粟文侯曰須吾租收邑粟至乃得也使者曰臣初來時見瀆中有魚張口謂臣曰吾窮水魚命在呼吸可得灌乎臣謂之曰待吾南見河堤之君決江淮之水灌汝口魚曰為命在須臾乃須決江淮之水比至君還必求吾於枯魚之肆今高平貧窮故遣臣詣君貸粟乃須租收粟至者大王必求臣於死人之墓藝文類聚八五太平御覽八四零古今合璧事類備要五七天中記四五淵鑑類函三九五子産死處女泣於室農夫哭於野北堂書鈔三五子産相鄭死婦人捨簪珥良人弛琴瑟北堂書鈔三五聲樂之象瑟易瑟良而合於樂也北堂書鈔一零九晉靈公好悲歌鼓琴北堂書鈔一零九淵鑑類函一八八聲樂之象控揭象萬物北堂書鈔一一一電陰擊輝耀北堂書鈔一五二鬻子曰禹之化天下也以五聲聽門懸磬鐘鐸以待四海之士初學記九十步之內有芳草後漢書王符傳淵鑑類函四零八昔鄒忌為齊相稷下先生淳于髡之屬七十二人皆輕鄒忌為設妙辭淳于髡三稱鄒忌三知之如應響髡等辭屈而去故所以尚干將莫邪者貴其立斷所以尚騏驥者貴其立至必且歷日曠久絲氂猶能栔石駑馬亦能致遠是以聰明敏捷人之美材也後漢書崔駰傳注文選陳孔璋答東阿王箋注太平御覽四三二鮑焦衣木皮食木實後漢書崔駰傳注寧戚飯牛於康衢擊車輻而歌碩鼠傅説代胥靡刑人築於傅巖之野高宗夢得之後漢書馬融傳注無類之説不戒之行不贊之辭君子慎之荀子正名篇楊倞注飢馬盈廄飢犬在宮見芻與骨動不可禁事類賦二三臣事仲尼猶執柸就江海飲莫知淺深也太平御覽二記纂淵海四三魏文侯師李悝著律書六篇古今合璧事類備要外集十七田英曰義死者不避鈇鉞之威義窮者不受軒冕之賜無義而生不如有義而死記纂淵海五四求利下交曾無愧色分銖之利知而必爭記纂淵海五四以徵為羽非絃之罪也以甘為苦非味之罪也記纂淵海五五葉公諸梁問樂王鮒曰晉大夫趙文子為人何若對曰好學而受規諫葉公曰疑未盡矣對曰好學者智也受規諫者仁也江出汶山其源若甕口至楚國其廣十里無他其下流多也人而好學受規諫宜哉其立也天中記九武王問太公曰貧富豈有命乎太公曰為之不密密而不富者盜在其室武王曰何為盜也公曰計之不熟一盜也收種不時二盜也娶婦無能三盜也養女太多四盜也棄事就酒五盜也衣服過度六盜也封藏不謹七盜也井竈不利八盜也舉息就禮九盜也無事燃燈十盜也取之安得富哉武王曰善天中記三九兩貴不可同兩勢不可雙楊慎藝林伐山十七魯獻子聘於晉宣子觴之三徙鍾石之懸不移而具獻子曰富哉家宣子曰子之家孰與我家富獻子曰吾家甚貧惟有二士曰顏回茲無靈者使吾邦家安平百姓和協惟此二者耳吾盡於此矣客出宣子曰彼君子也以養賢為富我鄙人也以鍾石為富孔子曰孟獻子之富可著於春秋焦氏類林一下閔子騫早喪母為後母所苦冬月以蘆花衣之其所生二子則衣之以綿父令閔子御車體寒失靷父責之閔子不自理父察知之歸謂婦曰我所以娶汝乃為吾子今汝欺我去無留子騫前曰母在一子寒母去三子單其父默然故曰孝哉閔子騫一言其母還再言三子溫淵鑑類函二七一黎侯失國久寓于衛衛不救其臣勸之歸而作中露也淵鑑類函十桑君出懷中藥與扁鵲飲以上池之水未至地承取竹木上露水淵鑑類函十周成王與幼弟戲於地得葉以與弟曰以此封唐周公曰選日王曰戲耳不封也周公曰王者重言封人而悔者不信於是遂封之淵鑑類函一一八王章為諸生學長安獨與妻居章病無被臥牛衣中與妻訣涕泣其妻呵怒之曰仲卿京師尊貴在朝廷人誰踰仲卿者今病困不自激卬乃反涕泣何鄙也淵鑑類函二六七朱雲年七十餘終于家病不呼醫飲藥遺言以身服斂棺周于身土周于椁淵鑑類函二六七隰斯彌見田成子田成子與登臺四望三面皆暢南望隰子家之樹蔽之田成子亦不言隰子歸使人伐之斧離數創隰子止之其相室曰何變之數也隰子曰古者有諺曰知淵中之魚者不祥夫田子將有事事大而我示之知微我必危矣不伐樹未有罪也知人之所不言其罪大矣乃不伐也淵鑑類函二七六趙簡子獵於晉山之陽撫轡而歎曰吾有食穀之馬數千多力之士數百欲以獵獸也吾恐鄰國養賢以獵吾也智哉簡子善反其身淵鑑類函二七七
